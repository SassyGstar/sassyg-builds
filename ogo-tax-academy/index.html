come is generally figured by:', choices:['Adding credits to gross income','Subtracting the standard or itemized deduction from adjusted gross income','Multiplying AGI by the tax rate','Subtracting withholding from wages'], correctIndex:1, rationale:'Total income \\u2192 adjustments \\u2192 AGI \\u2192 minus the standard or itemized deduction (and any QBI) = taxable income.' },\n    { id:'P1-6', sec:'Filing Status', prompt:'A taxpayer\\u2019s marital status for the entire tax year is generally determined as of:', choices:['January 1','April 15','December 31','The date of filing'], correctIndex:2, rationale:'Marital status is determined as of December 31 of the tax year.' },\n    { id:'P1-7', sec:'Filing Status', prompt:'To file as Head of Household, an unmarried taxpayer must:', choices:['Simply be unmarried','Pay more than half the cost of keeping up a home for a qualifying person','Have any dependent','Earn under $16,100'], correctIndex:1, rationale:'HOH requires being unmarried/considered unmarried, paying more than half the home\\u2019s cost, and having a qualifying person for more than half the year.' },\n    { id:'P1-8', sec:'Filing Status', prompt:'If one spouse filing Married Filing Separately itemizes deductions, the other spouse\\u2019s standard deduction is:', choices:['Doubled','Unchanged','$0','Half the single amount'], correctIndex:2, rationale:'When one MFS spouse itemizes, the other spouse\\u2019s standard deduction is $0.' },\n    { id:'P1-9', sec:'Filing Status', prompt:'Qualifying Surviving Spouse status is available:', choices:['For five years after a spouse\\u2019s death','For the two years after the year of death, if maintaining a home for a dependent child','Only in the year of death','Only if remarried'], correctIndex:1, rationale:'QSS applies for the two tax years following the year the spouse died, if not remarried and maintaining a home for a dependent child.' },\n    { id:'P1-10', sec:'Filing Status', prompt:'To be \"considered unmarried\" for HOH, a married taxpayer must (among other tests) show the spouse:', choices:['Filed jointly','Did not live in the home during the last 6 months of the year','Had no income','Signed Form 8332'], correctIndex:1, rationale:'A key \"considered unmarried\" test is that the spouse did not live in the home during the last six months of the year.' },\n    { id:'P1-11', sec:'Dependents', prompt:'Every potential dependent must first pass which three universal tests?', choices:['Age, residency, support','Dependent taxpayer, joint return, and citizen-or-resident','Relationship, gross income, support','Income, age, blindness'], correctIndex:1, rationale:'All dependents must pass the dependent-taxpayer test, the joint-return test, and the citizen-or-resident test before QC/QR analysis.' },\n    { id:'P1-12', sec:'Dependents', prompt:'The Qualifying Child age test is met if the child is:', choices:['Any age','Under 19, or under 24 and a full-time student, or any age if permanently disabled','Under 17 only','Under 13'], correctIndex:1, rationale:'A QC must be under 19, under 24 and a full-time student, or any age if permanently and totally disabled.' },\n    { id:'P1-13', sec:'Dependents', prompt:'The Qualifying Child support test asks whether:', choices:['The taxpayer provided more than half the child\\u2019s support','The child did NOT provide more than half of their own support','The child earned under $5,300','The child lived elsewhere'], correctIndex:1, rationale:'For a QC, the test is that the child did not provide more than half of their own support \\u2014 the child\\u2019s gross income is irrelevant.' },\n    { id:'P1-14', sec:'Dependents', prompt:'For 2026, a Qualifying Relative\\u2019s taxable gross income must be less than:', choices:['$4,700','$5,050','$5,300','$16,100'], correctIndex:2, rationale:'For 2026 a qualifying relative must have taxable gross income under $5,300 (nontaxable Social Security is excluded from this test).' },\n    { id:'P1-15', sec:'Dependents', prompt:'When two parents can claim the same child and no Form 8332 is signed, the tie-breaker first favors:', choices:['The higher-income parent','The parent with whom the child lived the greater number of nights','The older parent','A 50/50 split'], correctIndex:1, rationale:'Between two parents, the first tie-breaker is residency \\u2014 the parent with whom the child lived longer; AGI matters only if the nights are equal.' },\n  ];\n\n  startP1Test = () => { this.setState({ view:'phase1test', p1Mode:'test', p1Answers:{}, p1Submitted:false, p1Seconds:1500 }); this.startP1Timer(); };\n  openP1Intro = () => { this.stopP1Timer(); this.setState({ view:'phase1test', p1Mode:'intro' }); };\n  startP1Timer() {\n    this.stopP1Timer();\n    this._p1t = setInterval(() => {\n      this.setState(s => {\n        if (s.p1Mode !== 'test' || s.p1Submitted) return null;\n        if (s.p1Seconds <= 1) { this.stopP1Timer(); this.submitP1Test(); return { p1Seconds:0 }; }\n        return { p1Seconds: s.p1Seconds - 1 };\n      });\n    }, 1000);\n  }\n  stopP1Timer() { if (this._p1t) { clearInterval(this._p1t); this._p1t = null; } }\n  submitP1Test = () => {\n    this.stopP1Timer();\n    let correct = 0;\n    this.phase1Bank.forEach(q => { if (this.state.p1Answers[q.id] === q.correctIndex) correct++; });\n    const pct = Math.round(correct / this.phase1Bank.length * 100);\n    this.setState(s => {\n      let best = s.p1Best;\n      if (best == null || pct > best) best = pct;\n      try { localStorage.setItem('ogo-phase1test', JSON.stringify({ best })); } catch (e) {}\n      return { p1Submitted:true, p1Best:best };\n    });\n  };\n  retakeP1Test = () => this.startP1Test();\n  pickP1 = (qid, idx) => this.setState(s => ({ p1Answers: { ...s.p1Answers, [qid]: idx } }));\n\n  // ---------- Schedule C interactive lab ----------\n  scCards = [\n    { id:'SC1', topic:'Business vs. hobby', scenario:'A client sells handmade furniture on weekends, keeps a separate business bank account and books, advertises, and intends to earn a profit. This year the activity showed a loss. How should it be treated?', choices:['As a hobby \\u2014 losses are never deductible','As a business \\u2014 it is pursued with a good-faith intention of making a profit','It cannot be reported at all','As wages on the W-2'], correctIndex:1, rationale:'An activity carried out in a businesslike manner with a good-faith profit intent is a business (report on Schedule C), even in a loss year. The IRS weighs nine factors including businesslike operation and effort.' },\n    { id:'SC2', topic:'Filing trigger', scenario:'A sole proprietor\\u2019s only income is a $425 net profit on Schedule C. Must they file a federal return?', choices:['No \\u2014 it is below the standard deduction','No \\u2014 the 1099-NEC threshold is $2,000','Yes \\u2014 net self-employment earnings are at least $400','Yes \\u2014 only if over age 65'], correctIndex:2, rationale:'A return is required when net self-employment earnings are $400 or more \\u2014 the SE-tax filing floor \\u2014 regardless of the standard deduction or any 1099 threshold.' },\n    { id:'SC3', topic:'Home office method', scenario:'A client uses a 200 sq ft room exclusively and regularly for business and wants the simplest option with no depreciation recapture. Which method fits?', choices:['Regular method \\u2014 actual expense percentage','Simplified method \\u2014 $5 per sq ft up to 300 sq ft','No deduction is available','Standard mileage'], correctIndex:1, rationale:'The simplified method is $5/sq ft up to 300 sq ft (max $1,500), requires no tracking of actual home expenses, and allows no depreciation \\u2014 avoiding later recapture.' },\n    { id:'SC4', topic:'Business meals', scenario:'A client spends $600 on qualifying business meals at restaurants in 2026, each documented with a business purpose and attendees. How much is deductible?', choices:['0% \\u2014 meals are never deductible','50% \\u2014 $300','100% \\u2014 $600','80% \\u2014 $480'], correctIndex:1, rationale:'For 2026, qualifying business meals are 50% deductible; the business purpose and participants must be documented.' },\n    { id:'SC5', topic:'Vehicle expenses', scenario:'A client wants the standard mileage rate rather than actual expenses for 2026 business driving. What rate applies, and what must they keep?', choices:['70\\u00a2/mile with no records','72.5\\u00a2/mile with a contemporaneous mileage log','$5/mile with receipts','65.5\\u00a2/mile with no log'], correctIndex:1, rationale:'The 2026 standard mileage rate is 72.5\\u00a2/mile (Notice 2026-10). Vehicles are listed property, so a contemporaneous log of date, mileage, and business purpose is required.' },\n    { id:'SC6', topic:'Cost recovery', scenario:'A client buys $50,000 of qualifying machinery and places it in service in 2026. What is the maximum bonus-depreciation percentage available?', choices:['40%','60%','80%','100%'], correctIndex:3, rationale:'Under OBBBA / Notice 2026-11, 100% bonus depreciation applies for 2026, letting owners fully expense qualifying equipment placed in service by December 31, 2026 (after Section 179 in the ordering rule).' },\n    { id:'SC7', topic:'Information reporting', scenario:'A freelancer earned $1,500 from a client who, under the new $2,000 threshold, did not issue a 1099-NEC. What must the freelancer do?', choices:['Nothing \\u2014 no 1099 means no reporting','Report all $1,500 as business income regardless of the 1099','Report only amounts over $2,000','Report it as a gift'], correctIndex:1, rationale:'OBBBA §70433 raised the 1099-NEC threshold to $2,000, but taxpayers must still report every dollar of business income even when no information return is issued.' },\n  ];\n  pickSC = (cid, idx) => this.setState(s => ({ scAnswers: { ...s.scAnswers, [cid]: idx } }));\n\n  // ---------- lifecycle ----------\n  componentDidMount() {\n    try {\n      const raw = localStorage.getItem('ogo-aftr');\n      if (raw) { const d = JSON.parse(raw); this.setState({ attempts: d.attempts || 0, lastScore: d.lastScore ?? null }); }\n    } catch (e) {}\n    try {\n      const p = localStorage.getItem('ogo-phase1');\n      if (p) { this.setState({ progress: JSON.parse(p) || {} }); }\n    } catch (e) {}\n    try {\n      const t = localStorage.getItem('ogo-phase2test');\n      if (t) { const d = JSON.parse(t); this.setState({ p2Best: d.best ?? null }); }\n    } catch (e) {}\n    try {\n      const t = localStorage.getItem('ogo-phase3test');\n      if (t) { const d = JSON.parse(t); this.setState({ p3Best: d.best ?? null }); }\n    } catch (e) {}\n    try {\n      const t = localStorage.getItem('ogo-phase1test');\n      if (t) { const d = JSON.parse(t); this.setState({ p1Best: d.best ?? null }); }\n    } catch (e) {}\n  }\n  componentWillUnmount() { this.stopTimer(); this.stopP2Timer(); this.stopP3Timer(); this.stopP1Timer(); }\n\n  startTimer() {\n    this.stopTimer();\n    this._t = setInterval(() => {\n      this.setState(s => {\n        if (s.examPhase !== 'running') return null;\n        if (s.secondsLeft <= 1) { this.stopTimer(); this.finishExam(); return { secondsLeft: 0 }; }\n        return { secondsLeft: s.secondsLeft - 1 };\n      });\n    }, 1000);\n  }\n  stopTimer() { if (this._t) { clearInterval(this._t); this._t = null; } }\n\n  // ---------- exam control ----------\n  startExam = () => {\n    if (this.state.attempts >= this.ATTEMPT_CAP) return;\n    this.setState({ examPhase:'running', examIdx:0, answers:{}, secondsLeft:10800 });\n    this.startTimer();\n  };\n  finishExam() {\n    const attempts = this.state.attempts + 1;\n    const pct = this.scorePctNum();\n    let lastScore = this.state.lastScore;\n    if (lastScore == null || pct > lastScore) lastScore = pct;\n    try { localStorage.setItem('ogo-aftr', JSON.stringify({ attempts, lastScore })); } catch(e) {}\n    this.setState({ examPhase:'results', attempts, lastScore });\n  }\n  submitExam = () => { this.stopTimer(); this.finishExam(); };\n  pick = (idx) => this.setState(s => ({ answers: { ...s.answers, [this.bank[s.examIdx].id]: idx } }));\n  nextQ = () => this.setState(s => ({ examIdx: Math.min(s.examIdx + 1, this.bank.length - 1) }));\n  prevQ = () => this.setState(s => ({ examIdx: Math.max(s.examIdx - 1, 0) }));\n  jumpTo = (i) => this.setState({ examIdx: i });\n  enterReview = () => this.setState({ examPhase:'review' });\n  exitReview = () => this.setState({ examPhase:'results' });\n  restartExam = () => this.setState({ examPhase:'idle' });\n\n  scoreCorrect() { return this.bank.reduce((n,q)=> n + (this.state.answers[q.id] === q.correctIndex ? 1 : 0), 0); }\n  scorePctNum() { return Math.round((this.scoreCorrect() / this.bank.length) * 100); }\n\n  // ---------- nav / cards ----------\n  go = (v) => this.setState({ view:v });\n  flipCard = () => this.setState(s => ({ flashFlipped: !s.flashFlipped }));\n  nextCard = () => this.setState(s => ({ flashIdx:(s.flashIdx+1)%this.flashcards.length, flashFlipped:false }));\n  prevCard = () => this.setState(s => ({ flashIdx:(s.flashIdx-1+this.flashcards.length)%this.flashcards.length, flashFlipped:false }));\n  toggleExempt = (k) => this.setState(s => ({ exempt: { ...s.exempt, [k]: !s.exempt[k] } }));\n  isExempt() { return Object.values(this.state.exempt).some(Boolean); }\n\n  fmtTime(sec) {\n    const h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;\n    return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');\n  }\n  daysToDeadline() {\n    const now = new Date();\n    const end = new Date('2026-12-31T23:59:59');\n    return Math.max(0, Math.ceil((end - now) / 86400000));\n  }\n\n  navBtnStyle(active) {\n    return 'text-align:left; background:' + (active ? 'rgba(255,255,255,.16)' : 'transparent') + '; color:#fff; border:0; padding:11px 13px; border-radius:8px; cursor:pointer; font-weight:700; font-size:13.5px; white-space:nowrap;';\n  }\n  barStyle(pct, color) { return 'height:100%; width:' + pct + '%; background:' + (color||'#00788A') + '; border-radius:20px;'; }\n\n  renderVals() {\n    const s = this.state;\n    const ex = this.isExempt();\n    const holderName = this.props.holderName ?? 'OGO Team Member';\n    const prog = s.progress || {};\n    const p1done = ['m1','m2','m3'].filter(k => prog[k] && prog[k].done).length;\n    const ticketUnlocked = p1done >= 3;\n\n    // nav\n    const navDefs = [['dashboard','Dashboard'],['path','Course Path'],['bootcamp','AFTR Bootcamp'],['ethics','Ethics & Due Diligence'],['readiness','AFSP Readiness'],['ticket','Golden Ticket'],['schedc','Schedule C Lab'],['crosswalk','Coverage Crosswalk'],['manager','Manager View']];\n    const navItems = navDefs.map(([key,label]) => ({ key, label, style:this.navBtnStyle(s.view===key), onClick:()=>this.go(key) }));\n    const titles = { dashboard:'Dashboard', path:'Course Path', bootcamp:'AFTR Bootcamp', ethics:'Ethics & Due Diligence', readiness:'AFSP Readiness', ticket:'Golden Ticket', crosswalk:'AFSP Coverage Crosswalk', manager:'Manager View', phase1test:'Phase 1 Practice Test', phase2test:'Phase 2 Practice Test', phase3test:'Phase 3 Practice Test', schedc:'Schedule C Interactive Lab' };\n\n    // CE buckets per track\n    const ceBuckets = ex\n      ? [ {label:'Federal tax law updates', done:1, total:3}, {label:'Federal tax law', done:7, total:10}, {label:'Ethics', done:0, total:2} ]\n      : [ {label:'AFTR (with test)', done:0, total:6}, {label:'Federal tax law', done:7, total:10}, {label:'Ethics', done:0, total:2} ];\n    const ceCards = ceBuckets.map(b => ({ label:b.label, frac:b.done+'/'+b.total+' hrs', sub:(b.done>=b.total?'Requirement met':(b.total-b.done)+' hours remaining'), bar:this.barStyle(Math.round(b.done/b.total*100)) }));\n    const totalDone = ceBuckets.reduce((n,b)=>n+b.done,0), totalReq = ceBuckets.reduce((n,b)=>n+b.total,0);\n    const readyPct = Math.round(totalDone/totalReq*100);\n\n    // phases\n    const phases = [\n      { tag:'Phase 1', title:'Foundations', state:'Complete', pct:100, blurb:'Plain-language groundwork: how the system works, who files, and who counts.', capstone:{ title:'Phase 1 Practice Test', desc:'15 questions · 25 minutes · three sections, with a full answer key and rationales on submit.', cta:'Start practice test', view:'phase1test' }, modules:[\n        {num:'1', title:'Intro to Taxation', desc:'The 1040, income flow, and the filing system.', lab:'Lesson + quiz'},\n        {num:'2', title:'Filing Status', desc:'Single, MFJ, MFS, HOH, QSS and the tests behind each.', lab:'Lesson + quiz'},\n        {num:'3', title:'Dependents', desc:'Qualifying child vs. qualifying relative tests.', lab:'Lesson + quiz'} ] },\n      { tag:'Phase 2', title:'Income Recognition', state:'In progress', pct:0, blurb:'What counts as income and where it lands on the return — wages, tips, investments, retirement, and self-employment under TY2026 rules.', capstone:{ title:'Phase 2 Practice Test', desc:'25 questions · 45 minutes · four sections, with a full answer key and rationales on submit.', cta:'Start practice test', view:'phase2test' }, modules:[\n        {num:'4', title:'W-2, Tips & Fringe', desc:'Reading the W-2, No Tax on Tips & Overtime (OBBBA), taxable vs. excluded fringe benefits.', lab:'Lesson + quiz'},\n        {num:'5', title:'Investment Income & Capital Gains', desc:'Interest, dividends, holding periods, the $3,000 loss limit, wash sales, and 1099-K.', lab:'Lesson + quiz'},\n        {num:'6', title:'Retirement & Social Security', desc:'RMDs under SECURE 2.0, 1099-R codes, provisional income, and SS taxability.', lab:'Lesson + quiz'},\n        {num:'7', title:'Self-Employment Income', desc:'Schedule C, SE tax, the wage base, filing thresholds, and estimated taxes.', lab:'Lesson + quiz'} ] },\n      { tag:'Phase 3', title:'Credits & Deductions', state:'In progress', pct:0, blurb:'The credits and deductions clients ask about — family, education, healthcare, and itemized — with the due diligence and 2026 figures behind each.', c e / 4 * 100);\n    phases[2].state = p3done === 4 ? 'Complete' : (p3done > 0 ? 'In progress' : 'Start here');\n    const scDone = prog.msc && prog.msc.done ? 1 : 0;\n    phases[3].pct = scDone ? 100 : 0;\n    phases[3].state = scDone ? 'Complete' : 'Start here';\n    const statePillMap = { 'Complete':'#1D5C22|#ECF8EE', 'Start here':'#005A69|#EAF4F6', 'In progress':'#005A69|#EAF4F6', 'New':'#8A6D12|#FFF3D6', 'Build':'#7A4AB0|#F1E9FB' };\n    const pill = (st) => { const [c,bg]=(statePillMap[st]||'#6F7780|#F1F3F4').split('|'); return 'font-size:11.5px; font-weight:800; color:'+c+'; background:'+bg+'; border-radius:999px; padding:5px 11px;'; };\n    const labPill = (l) => { const interactive = l==='Interactive lab'||l==='Capstone'; return 'display:inline-block; font-size:10.5px; font-weight:800; border-radius:999px; padding:3px 9px; color:'+(interactive?'#005A69':'#6F7780')+'; background:'+(interactive?'#D6EEF1':'#F1F3F4')+';'; };\n    const lessonByNum = { '1':'m1', '2':'m2', '3':'m3', '4':'m4', '5':'m5', '6':'m6', '7':'m7', '8':'m8', '9':'m9', '10':'m10', '11':'m11', 'SC':'msc' };\n    const phasesV = phases.map(p => ({ ...p, statePill:pill(p.state), pct:p.pct+'%',\n      hasCapstone: !!p.capstone,\n      capstone: p.capstone ? { ...p.capstone, onClick: () => this.setState({ view: p.capstone.view, p1Mode:'intro', p2Mode:'intro', p3Mode:'intro' }) } : null,\n      modules:p.modules.map(m=>{\n      const lid = lessonByNum[m.num];\n      const isLab = m.num==='C';\n      const clickable = !!lid || isLab;\n      const dn = clickable && lid && prog[lid] && prog[lid].done;\n      return { ...m, labPill:labPill(m.lab),\n        onClick: isLab ? (()=>this.go('schedc')) : (clickable ? (()=>this.openLesson(lid)) : (()=>{})),\n        cardStyle: 'border:1px solid '+(dn?'#B7E0BF':'#E2ECEE')+'; background:'+(dn?'#F4FBF5':'#FAFDFD')+'; border-radius:11px; padding:15px;'+(clickable?' cursor:pointer;':''),\n        numStyle: 'width:24px; height:24px; flex:none; border-radius:7px; ba
