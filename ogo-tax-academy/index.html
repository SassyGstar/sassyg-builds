cat:'Federal tax law', hrs:'2', domain:'Domain 2', src:'Pub 17, Pub 501' },\n    { module:'Module 4–6 · Income Recognition', cat:'Federal tax law', hrs:'3', domain:'Domain 2', src:'Pub 17, Pub 525' },\n    { module:'Module 7 · Tax Law Updates (NEW)', cat:'Federal tax law updates', hrs:'1', domain:'Domain 1', src:'Rev. Proc. 2025-32, Pub 6079' },\n    { module:'Module 8 · Due Diligence (Form 8867 lab)', cat:'Federal tax law', hrs:'1', domain:'Domain 3', src:'Form 8867, IRC §6695(g)' },\n    { module:'Module 9 · Education & PTC lab', cat:'Federal tax law', hrs:'2', domain:'Domain 2', src:'Pub 970, Form 8863/8962' },\n    { module:'Module 10 · Adjustments lab', cat:'Federal tax law', hrs:'1', domain:'Domain 2', src:'Schedule 1, Pub 590-A' },\n    { module:'Module 11–12 · Credits & Capstone', cat:'Federal tax law', hrs:'1', domain:'Domain 2', src:'Schedule 8812, Pub 972' },\n    { module:'Schedule C Lab', cat:'Federal tax law', hrs:'1', domain:'Domain 2', src:'Pub 334, Pub 463' },\n    { module:'AFTR Bootcamp + practice exam', cat:'Annual Federal Tax Refresher', hrs:'6', domain:'Domain 1–3', src:'Pub 6026, Pub 6079' },\n    { module:'Ethics & Due Diligence module', cat:'Ethics', hrs:'2', domain:'Domain 3', src:'Circular 230 Subpart B, §10.51' },\n  ];\n\n  ethicsCards = [\n    { tag:'Circular 230 · Subpart B', title:'Duties & restrictions', points:['Due diligence as to accuracy of returns and documents','Prompt disposition of pending IRS matters','Restrictions on fees and on negotiating client refund checks','Duty to advise clients of errors, omissions, and noncompliance'] },\n    { tag:'Circular 230 · §10.51', title:'Incompetence & disreputable conduct', points:['Conviction of any offense involving dishonesty or breach of trust','Giving false or misleading information to the IRS','Willfully failing to file or to pay tax','Willfully assisting in the violation of federal tax law'] },\n    { tag:'Due diligence', title:'Knowledge & documentation', points:['Apply the knowledge requirement — ask reasonable questions when info seems incomplete','Compute credits correctly and complete Form 8867','Retain due-diligence records for three years','Document the source of answers, not just the conclusion'] },\n    { tag:'Penalties', title:'Consequences of failure', points:['IRC §6695(g) penalty per credit/status, per return','IRC §7216 penalties for unauthorized disclosure of return info','Preparer penalties under §6694 for understatements','Possible suspension or disbarment from practice'] },\n  ];\n\n  team = [\n    { name:'Maria Alvarez', track:'Non-exempt (18 hr)', cePct:72, ce:'13/18', aftr:'82% · passed', status:'On track' },\n    { name:'James Chen', track:'Exempt (15 hr)', cePct:93, ce:'14/15', aftr:'n/a', status:'On track' },\n    { name:'Priya Nair', track:'Non-exempt (18 hr)', cePct:39, ce:'7/18', aftr:'61% · retry', status:'At risk' },\n    { name:'Dev Okafor', track:'Non-exempt (18 hr)', cePct:17, ce:'3/18', aftr:'not started', status:'Behind' },\n    { name:'Sara Lindqvist', track:'Exempt (15 hr)', cePct:100, ce:'15/15', aftr:'n/a', status:'Complete' },\n  ];\n\n  lessons = this._buildLessons();\n\n  _buildLessons() {\n    const P=(t)=>'<p style=\"margin:0 0 14px; line-height:1.7; color:#374151; font-size:14.5px;\">'+t+'<\u002Fp>';\n    const H=(t)=>'<h3 style=\"font-size:19px; margin:26px 0 10px; color:#0F3B43; letter-spacing:-.01em;\">'+t+'<\u002Fh3>';\n    const b=(t)=>'<strong style=\"color:#0F3B43;\">'+t+'<\u002Fstrong>';\n    const teal=(t)=>'<div style=\"background:#EAF4F6; border:1px solid #CFE6E9; border-left:4px solid #00788A; border-radius:10px; padding:15px 17px; margin:16px 0; font-size:14px; line-height:1.65; color:#123c43;\">'+t+'<\u002Fdiv>';\n    const gold=(t)=>'<div style=\"background:#FFF8E8; border:1px solid #EFD98C; border-left:4px solid #C9A227; border-radius:10px; padding:15px 17px; margin:16px 0; font-size:14px; line-height:1.65; color:#5C4A0E;\">'+t+'<\u002Fdiv>';\n    const UL=(a)=>'<ul style=\"margin:0 0 14px; padding-left:20px; display:flex; flex-direction:column; gap:8px; color:#374151; font-size:14.5px; line-height:1.6;\">'+a.map(i=>'<li>'+i+'<\u002Fli>').join('')+'<\u002Ful>';\n    const OL=(a)=>'<ol style=\"margin:0 0 14px; padding-left:20px; display:flex; flex-direction:column; gap:9px; color:#374151; font-size:14.5px; line-height:1.6;\">'+a.map(i=>'<li>'+i+'<\u002Fli>').join('')+'<\u002Fol>';\n    const TBL=(heads,rows)=>'<div style=\"overflow-x:auto;\"><table style=\"width:100%; border-collapse:collapse; margin:6px 0 16px; font-size:13.5px;\"><thead><tr>'+heads.map(h=>'<th style=\"text-align:left; background:#005A69; color:#fff; font-weight:800; padding:10px 13px;\">'+h+'<\u002Fth>').join('')+'<\u002Ftr><\u002Fthead><tbody>'+rows.map((r,ri)=>'<tr style=\"background:'+(ri%2?'#F7FBFB':'#fff')+';\">'+r.map(c=>'<td style=\"padding:10px 13px; border-bottom:1px solid #E7EEF0; color:#374151;\">'+c+'<\u002Ftd>').join('')+'<\u002Ftr>').join('')+'<\u002Ftbody><\u002Ftable><\u002Fdiv>';\n\n    const m1 =\n      P('The U.S. individual income tax is the single largest source of federal revenue, and for a preparer it all comes together on one form: '+b('Form 1040')+'. Before credits, deductions, or the AFTR domains make sense, you need a clear mental model of how a return is built from the top down.')\n      + H('A pay-as-you-go, progressive system')\n      + P('Two ideas define the system. It is '+b('pay-as-you-go')+': tax is collected throughout the year through employer withholding (reported on Form W-2) and quarterly estimated payments on income that is not withheld, such as self-employment. It is also '+b('progressive')+': income is taxed in layered brackets, so higher slices of income are taxed at higher rates.')\n      + teal(b('Marginal vs. effective rate.')+' A client \"in the 22% bracket\" does not pay 22% on every dollar. Only the dollars that fall inside that bracket are taxed at 22%; earlier dollars are still taxed at 10% and 12%. Their '+b('effective rate')+' \\u2014 total tax divided by total income \\u2014 is always lower than their top marginal rate.')\n      + H('Form 1040: the flow of a return')\n      + P('Almost every return follows the same spine. Learn this order once and the rest of the course hangs off it:')\n      + OL([\n          b('Total (gross) income')+' \\u2014 wages, interest, dividends, business income, capital gains, and retirement distributions.',\n          b('Adjustments to income')+' (\"above-the-line\" deductions) are subtracted to reach '+b('Adjusted Gross Income (AGI)')+'.',\n          'Subtract the greater of the '+b('standard deduction')+' or '+b('itemized deductions')+' to reach '+b('taxable income')+'.',\n          'Apply the tax rate schedule to taxable income to get the '+b('tentative tax')+'.',\n          'Subtract '+b('credits')+' and add any other taxes to reach '+b('total tax')+'.',\n          'Compare total tax to '+b('payments and withholding')+' \\u2014 the difference is a refund or a balance due.'\n        ])\n      + teal('AGI (and its cousin '+b('MAGI')+', modified AGI) is a pivotal number: a large share of credits and deductions phase out as AGI rises, so where income lands here ripples through the whole return.')\n      + H('Deductions vs. credits')\n      + P('These are the two ways to lower a tax bill, and they are not equal. A '+b('deduction')+' reduces taxable income, so its value depends on the client\\u2019s bracket. A '+b('credit')+' reduces the tax itself, dollar for dollar.')\n      + gold(b('$1,000, two ways.')+' For a client in the 12% bracket, a $1,000 '+b('deduction')+' saves about $120. A $1,000 '+b('credit')+' saves the full $1,000 \\u2014 more than eight times as much.')\n      + H('Refundable vs. nonrefundable credits')\n      + P('Credits split into two kinds. A '+b('nonrefundable')+' credit can reduce tax to zero but no further (for example, the Lifetime Learning Credit). A '+b('refundable')+' credit can go past zero and generate a refund \\u2014 examples include the Earned Income Tax Credit and the refundable portions of the Child Tax Credit and the American Opportunity Credit.')\n      + H('Who must file for Tax Year 2026')\n      + P('Whether a client must file generally depends on gross income measured against the standard deduction for their status, adjusted for age and special situations. Self-employed clients must file with '+b('$400')+' or more of net self-employment earnings. Even when filing is not required, it is often worthwhile \\u2014 it is the only way to recover withholding or claim refundable credits.')\n      + TBL(['Filing status','2026 base standard deduction'], [['Single / Married Filing Separately','$16,100'],['Head of Household','$24,150'],['Married Filing Jointly / Qualifying Surviving Spouse','$32,200']]);\n\n    const m2 =\n      P('Filing status is the first real judgment call on a return. It sets the standard deduction, the tax brackets, and eligibility for a long list of credits \\u2014 so an error here quietly distorts everything downstream.')\n      + H('One snapshot: December 31')\n      + P('Marital status is generally determined on the '+b('last day of the tax year')+'. If a client is married on December 31, they are treated as married for the entire year; if a divorce or legal separation is final by December 31, they are unmarried for the year. If a spouse died during the year, the taxpayer is generally considered married for that year.')\n      + H('The five filing statuses')\n      + TBL(['Status','Who it fits'], [\n          ['Single','Unmarried or legally separated on December 31, and no other status applies.'],\n          ['Married Filing Jointly (MFJ)','Married on December 31; both spouses report income on one return and share joint and several liability.'],\n          ['Married Filing Separately (MFS)','Married but each spouse files their own return \\u2014 sometimes chosen for liability or repayment-plan reasons.'],\n          ['Head of Household (HOH)','Unmarried or \"considered unmarried,\" paid more than half the cost of a home, with a qualifying person.'],\n          ['Qualifying Surviving Spouse (QSS)','Spouse died in one of the two prior years, not remarried, maintains a home for a dependent child \\u2014 uses MFJ brackets and deduction.']\n        ])\n      + H('Head of Household \\u2014 the tests')\n      + P('HOH is valuable (a larger standard deduction and wider brackets than Single) but it has real requirements. The taxpayer must be unmarried or considered unmarried, must have paid '+b('more than half')+' the cost of keeping up the home, and a '+b('qualifying person')+' must generally have lived with them more than half the year. One key exception: a '+b('dependent parent')+' does not have to live with the taxpayer.')\n      + teal(b('\"Considered unmarried\" for HOH.')+' A still-married taxpayer can file HOH only if '+b('all four')+' are true: (1) they file a separate return; (2) they paid more than half the cost of keeping up the home; (3) their spouse did '+b('not')+' live in the home during the last six months of the year; and (4) the home was the main home of their child for more than half the year.')\n      + H('The Married Filing Separately trap')\n      + gold(b('If one spouse itemizes, the other must too.')+' On MFS returns, if one spouse itemizes deductions, the other spouse\\u2019s standard deduction becomes '+b('$0')+' \\u2014 often leaving them with little or nothing to deduct. MFS also disqualifies or sharply limits many benefits, including most education credits and the Earned Income Tax Credit.')\n      + H('Standard deduction by status (TY2026)')\n      + TBL(['Filing status','Base standard deduction'], [['Single / MFS','$16,100'],['Head of Household','$24,150'],['MFJ / QSS','$32,200']])\n      + P('An '+b('additional standard deduction')+' applies for taxpayers who are 65 or older or blind: '+b('$2,050')+' per condition for unmarried filers (Single/HOH) and '+b('$1,650')+' per condition for married filers (MFJ/MFS/QSS). A taxpayer who is both 65+ and blind gets two additions.');\n\n    const m3 =\n      P('Claiming a dependent unlocks the Child Tax Credit, the Credit for Other Dependents, education benefits, and can support Head of Household status. But a person only counts as a dependent if they pass the right set of tests.')\n      + H('Three tests every dependent must pass')\n      + P('Before sorting a person into a category, three universal tests apply to '+b('all')+' dependents:')\n      + UL([\n          b('Dependent Taxpayer Test')+' \\u2014 a person who can be claimed as a dependent by someone else generally cannot claim dependents of their own.',\n          b('Joint Return Test')+' \\u2014 a married dependent generally cannot file a joint return, unless it is filed only to claim a refund with no tax liability on separate returns.',\n          b('Citizen or Resident Test')+' \\u2014 the dependent must be a U.S. citizen, U.S. national, or resident of the U.S., Canada, or Mexico.'\n        ])\n      + H('Qualifying Child \\u2014 the five tests')\n      + OL([\n          b('Relationship')+' \\u2014 your child, stepchild, foster child, sibling, half- or step-sibling, or a descendant of any of them.',\n          b('Age')+' \\u2014 under 19 at year-end, or under 24 and a full-time student, or any age if permanently and totally disabled.',\n          b('Residency')+' \\u2014 lived with you for more than half the year.',\n          b('Support')+' \\u2014 the child did not provide more than half of their '+b('own')+' support.',\n          b('Joint return')+' \\u2014 the child does not file a joint return (except to claim a refund).'\n        ])\n      + teal('Age is measured at '+b('year-end')+', and the full-time-student rule keeps many college students under 24 in the qualifying-child category even after their 19th birthday.')\n      + H('Qualifying Relative \\u2014 the four tests')\n      + OL([\n          b('Not a qualifying child')+' \\u2014 the person is not your qualifying child or anyone else\\u2019s.',\n          b('Member of household or relationship')+' \\u2014 either lived with you all year, or is a listed relative (parents and certain others do '+b('not')+' have to live with you).',\n          b('Gross income')+' \\u2014 the person\\u2019s gross income is less than '+b('$5,300')+' for TY2026.',\n          b('Support')+' \\u2014 you provided more than half of the person\\u2019s total support.'\n        ])\n      + H('Quick compare')\n      + TBL(['Test','Qualifying Child','Qualifying Relative'], [\n          ['Age limit','Yes (under 19 / 24, or disabled)','None'],\n          ['Gross income limit','None','Under $5,300 (TY2026)'],\n          ['Support','Child must not provide >\\u00bd of own support','You must provide >\\u00bd of their support'],\n          ['Must live with you','More than half the year','All year, unless a listed relative']\n        ])\n      + gold(b('Watch for:')+' when two people could claim the same child, IRS '+b('tie-breaker rules')+' decide who may; tax-exempt income (like certain Social Security) is excluded from the gross-income test; and support includes the fair rental value of lodging, not just cash.');\n\n    const m4 =\n      P('Income recognition starts with the paycheck. Module 4 covers the Form W-2, the two new \"No Tax on Tips\" and \"No Tax on Overtime\" deductions created by the One Big Beautiful Bill Act (OBBBA), and how to tell a taxable fringe benefit from an excluded one.')\n      + H('Reading the Form W-2')\n      + P('The three wage boxes rarely match, and knowing why is a core preparer skill. '+b('Box 1')+' is federal taxable wages, '+b('Box 3')+' is Social Security wages, and '+b('Box 5')+' is Medicare wages.')\n      + teal(b('Why Box 1 is often lower than Box 3.')+' Pre-tax '+b('401(k) deferrals')+' (Box 12, Code D) reduce federal taxable wages in Box 1 but are still subject to Social Security and Medicare tax \\u2014 so they stay in Boxes 3 and 5. A lower Box 1 is normal, not a payroll error.')\n      + H('No Tax on Tips (OBBBA \\u00a770201)')\n      + P('Workers in customary tip occupations may take a new '+b('deduction for qualified tips of up to $25,000')+' for tax years 2025\\u20132028.')\n      + UL([\n          'The deduction reduces '+b('income tax only')+' \\u2014 tips remain fully subject to Social Security and Medicare (FICA) tax.',\n          'It '+b('phases out')+' for MAGI above '+b('$150,000')+' (single/HOH) and '+b('$300,000')+' (married filing jointly).',\n          'Only reported, substantiated tips can be deducted.'\n        ])\n      + H('No Tax on Overtime (OBBBA \\u00a770202)')\n      + P('Only the '+b('premium \"half\" portion')+' of time-and-a-half pay is a qualified overtime deduction \\u2014 not the whole overtime check.')\n      + gold(b('Example.')+' An employee paid $20/hour earns $30/hour for overtime. The qualified amount is the '+b('$10 premium')+' per overtime hour, not the full $30. The deduction is capped at '+b('$12,500')+' (single) / '+b('$25,000')+' (MFJ), and the premium must be '+b('separately reported')+' on the W-2 or 1099 to qualify.')\n      + H('Taxable vs. excluded fringe benefits')\n      + TBL(['Generally taxable (Box 1)','Generally excluded'], [\n          ['Cash and gift cards (any amount)','HSA contributions within limits'],\n          ['Personal use of a company car','Employer-paid HDHP premiums'],\n          ['Most awards paid in cash','Educational assistance up to $5,250']\n        ])\n      + P('The rule of thumb: '+b('cash and cash-equivalents are always taxable')+', regardless of how small. Many in-kind health and education benefits are excluded when statutory requirements are met.');\n\n    const m5 =\n      P('Module 5 moves from wages to portfolio income: interest, dividends, and the sale of capital assets \\u2014 plus the loss limits, the wash-sale rule, and the reinstated 1099-K threshold.')\n      + H('Interest income \\u2014 taxable vs. tax-exempt')\n      + P('Taxable interest (Form 1099-INT) is reported on Form 1040 Line 2b. '+b('Tax-exempt')+' municipal-bond interest goes on Line 2a.')\n      + teal('Even though municipal interest is federally tax-free, it is '+b('added back')+' in the provisional-income formula that decides how much Social Security is taxable (Module 6) \\u2014 so it is never truly \"invisible\" on a return.')\n      + H('Dividends on Form 1099-DIV')\n      + P('Do not add the two dividend boxes together. '+b('Box 1b (qualified dividends)')+' is a '+b('subset')+' of '+b('Box 1a (total ordinary dividends)')+'. Box 1b is taxed at the preferential 0%/15%/20% capital-gains rates; the remainder of Box 1a is taxed at ordinary rates.')\n      + H('Capital gains and the holding period')\n      + P('An asset held '+b('more than one year')+' (366+ days) produces a '+b('long-term')+' gain taxed at preferential rates; one year or less is short-term and taxed as ordinary income.')\n      + TBL(['2026 taxable income (single)','LT capital-gain rate'], [['Up to $49,450','0%'],['$49,451 \\u2013 $545,500','15%'],['Over $545,500','20%']])\n      + H('Capital losses and the $3,000 limit')\n      + P('Net capital losses first offset capital gains. Any remaining net loss can offset up to '+b('$3,000')+' of ordinary income per year ('+b('$1,500 MFS')+') under IRC \\u00a71211; the rest '+b('carries forward')+' to future years.')\n      + H('The wash-sale rule')\n      + gold('If a taxpayer sells a security at a loss and buys a '+b('substantially identical')+' security within '+b('30 days before or after')+' the sale, the loss is '+b('disallowed')+' for the current year and instead '+b('added to the basis')+' of the replacement shares.')\n      + H('Third-party network reporting (1099-K)')\n      + P('OBBBA \\u00a770432 '+b('reinstated the higher 1099-K threshold')+': platforms like Venmo or PayPal issue a 1099-K only when aggregate payments exceed '+b('$20,000 and 200 transactions')+'. A missing 1099-K does not make otherwise-taxable income tax-free.');\n\n    const m6 =\n      P('Module 6 covers money coming out of retirement accounts and the taxation of Social Security \\u2014 including the SECURE 2.0 changes to required minimum distributions.')\n      + H('Required minimum distributions under SECURE 2.0')\n      + P('RMDs are the amounts retirees must begin withdrawing from most tax-deferred accounts. SECURE 2.0 raised the starting age:')\n      + UL([\n          b('Age 73')+' for taxpayers born 1951\\u20131959.',\n          b('Age 75')+' for taxpayers born 1960 or later.',\n          b('Roth 401(k)')+' accounts are no longer subject to lifetime RMDs.'\n        ])\n      + teal('A taxpayer who '+b('turns 73 in 2026')+' has an RMD obligation for 2026 \\u2014 the \"73\" rule applies to this fact pattern.')\n      + H('Form 1099-R distribution codes')\n      + P('Box 7 of Form 1099-R tells you how a distribution is taxed. '+b('Code 1')+' means an '+b('early distribution with no known exception')+' \\u2014 generally taxable and subject to the additional '+b('10% penalty')+' (reported on Form 5329) unless an exception applies.')\n      + gold(b('Qualified Roth distributions are tax-free')+' when '+b('both')+' are met: the account has satisfied the '+b('5-year')+' rule '+b('and')+' the owner is at least '+b('59\\u00bd')+' (or another qualifying event applies).')\n      + H('Provisional income')\n      + P('Whether Social Security is taxable turns on '+b('provisional income')+':')\n      + teal(b('Provisional income = AGI (excluding Social Security) + tax-exempt interest + \\u00bd of Social Security benefits.'))\n      + H('How much Social Security is taxable')\n      + TBL(['Provisional income (single)','Portion of benefits taxable'], [['Below $25,000','0%'],['$25,000 \\u2013 $34,000','Up to 50%'],['Above $34,000','Up to 85%']])\n      + P('No more than '+b('85%')+' of Social Security benefits is ever included in taxable income. Separately, the OBBBA '+b('senior deduction')+' of '+b('$6,000')+' (age 65+, separate from the standard deduction) phases out above $75,000 MAGI (single) / $150,000 (MFJ).');\n\n    const m7 =\n      P('Module 7 covers the self-employed taxpayer: Schedule C profit, self-employment tax, filing thresholds, the raised information-reporting thresholds, and quarterly estimated payments.')\n      + H('Self-employment tax')\n      + P('Self-employment (SE) tax funds Social Security and Medicare for people who work for themselves. It is '+b('15.3%')+' \\u2014 but not on the full profit.')\n      + teal(b('SE tax base = 92.35% of net profit.')+' The 92.35% factor accounts for the employer-equivalent half. Example: $50,000 net profit \\u2192 $50,000 \\u00d7 0.9235 = $46,175 \\u00d7 0.153 \\u2248 '+b('$7,065')+' of SE tax.')\n      + H('The Social Security wage base')\n      + P('Only earnings up to the annual '+b('Social Security wage base \\u2014 $184,500 for 2026')+' \\u2014 are subject to the 12.4% OASDI portion. Earnings above that are subject only to the 2.9% Medicare portion (no cap).')\n      + H('Filing and reporting thresholds')\n      + UL([\n          'A taxpayer with '+b('$400 or more')+' of net self-employment earnings '+b('must file')+' a return, even with no other income.',\n          'OBBBA \\u00a770433 raised the '+b('Form 1099-NEC')+' reporting threshold from $600 to '+b('$2,000')+' beginning in 2026.',\n          'The '+b('Form 1099-K')+' threshold is reinstated at '+b('$20,000 and 200 transactions')+' (\\u00a770432).'\n        ])\n      + gold('A missing 1099 does not remove the obligation to report income. Self-employed clients owe tax on '+b('all')+' business income regardless of whether a form was issued.')\n      + H('Estimated taxes')\n      + P('Because no employer withholds for them, self-employed taxpayers generally pay '+b('quarterly estimated taxes')+' using '+b('Form 1040-ES')+' to avoid an underpayment penalty.');\n\n    const SRC=(items)=>'<div style=\"background:#F1F5F6; border:1px solid #DDE6E8; border-radius:10px; padding:13px 16px; margin:20px 0 2px; font-size:12px; line-height:1.7; color:#4B5563;\"><strong style=\"display:block; color:#005A69; margin-bottom:4px; font-size:10.5px; text-transform:uppercase; letter-spacing:.07em;\">IRS sources \\u00b7 verify figures for TY2026<\u002Fstrong>'+items.join(' \\u00b7 ')+'<\u002Fdiv>';\n\n    const m8 =\n      P('Dependency (Phase 1) is the gate; Phase 3 is where those dependents turn into money on the return. Module 8 covers the family credits and the '+b('due-diligence')+' rules that protect the client, the preparer, and the firm.')\n      + H('Child Tax Credit (CTC) and the Additional CTC')\n      + P('The CTC is '+b('$2,200 per qualifying child')+' under age 17 for 2026 (indexed going forward). Up to '+b('$1,700')+' is refundable as the Additional CTC, and the refundable portion requires at least '+b('$2,500')+' of earned income.')\n      + UL([\n          'The credit phases out by $50 per $1,000 of MAGI above '+b('$200,000')+' (single/HOH) or '+b('$400,000')+' (MFJ).',\n          'Each qualifying child needs an '+b('SSN valid for employment')+', and at least one parent must have an SSN.',\n          'Claimed on '+b('Schedule 8812')+'.'\n        ])\n      + H('Credit for Other Dependents (ODC)')\n      + P('A '+b('$500 nonrefundable')+' credit for dependents who are not CTC-eligible \\u2014 older children, a qualifying relative, or an elderly parent. Same MAGI phaseout as the CTC. You cannot claim both CTC and ODC for the same person.')\n      + H('Earned Income Tax Credit (EITC)')\n      + P('A '+b('refundable')+' credit for low-to-moderate-income workers. For 2026 the maximum EITC is '+b('$8,231')+' with three or more qualifying children. It carries strict investment-income limits and is one of the most audited areas \\u2014 handle with care.')\n      + H('Child & Dependent Care Credit (Form 2441)')\n      + P('This helps clients who pay for care so they can work. Under OBBBA, the top credit rate rose from 35% to '+b('50%')+' beginning in 2026.')\n      + TBL(['AGI (single)','Credit rate'], [['$15,000 or less','50%'],['$15,001 \\u2013 $45,000','Phases 50% \\u2192 35%'],['$45,001 \\u2013 $75,000','35%'],['Over $105,000','20% floor']])\n      + P('Expense limits are unchanged: '+b('$3,000')+' for one qualifying person, '+b('$6,000')+' for two or more. The credit is '+b('nonrefundable')+', and you must report the '+b('care provider\\u2019s TIN')+'. Employer dependent-care benefits (W-2 Box 10) are excludable up to '+b('$7,500')+' for 2026.')\n      + H('Due diligence \\u2014 Form 8867')\n      + P('Paid-preparer due diligence applies to '+b('EITC, CTC/ACTC/ODC, AOTC, and Head of Household')+'. For each, you must meet the '+b('knowledge')+', '+b('computation')+', '+b('record-retention')+', and '+b('submission')+' requirements, and keep records for '+b('three years')+'.')\n      + gold(b('Manager review required')+' when facts are inconsistent or incomplete \\u2014 duplicate dependents across returns, an unverifiable care provider, mismatched addresses, or wages that don\\u2019t support the claimed credit. A due-diligence failure carries an IRC \\u00a76695(g) penalty '+b('per credit, per return')+'.')\n      + SRC(['Schedule 8812 (CTC/ACTC/ODC)','Schedule EIC','Form 2441 &amp; Pub 503','Form 8867 &amp; IRC \\u00a76695(g)','Rev. Proc. 2025-32']);\n\n    const m9 =\n      P('Module 9 covers the education, adoption, and healthcare benefits \\u2014 each with its own forms, eligibility rules, and \\u201cno double benefit\\u201d traps.')\n      + H('Education credits: AOTC vs. LLC')\n      + P('The '+b('American Opportunity Tax Credit')+' is up to '+b('$2,500 per student')+' (100% of the first $2,000 plus 25% of the next $2,000), '+b('40% refundable')+' (up to $1,000). It is limited to the '+b('first four years')+' of postsecondary study, requires at least half-time enrollment, and needs the school\\u2019s '+b('EIN')+' and the student\\u2019s SSN.')\n      + P('The '+b('Lifetime Learning Credit')+' is up to '+b('$2,000 per return')+' (20% of up to $10,000), '+b('nonrefundable')+', with no year limit and no enrollment minimum. You '+b('cannot claim both')+' AOTC and LLC for the same student in the same year.')\n      + teal('Both credits start from '+b('Form 1098-T')+'. Tax-free scholarships and grants '+b('reduce')+' qualified expenses, and the same dollar of expense cannot be used for a credit '+b('and')+' a tax-free 529 distribution \\u2014 that is the double-benefit rule. Beginning in 2026 an SSN is required to claim AOTC or LLC.')\n      + H('Adoption Credit')\n      + P('For 2026 the maximum qualified adoption expenses are '+b('$17,670')+', and the credit is now '+b('partially refundable up to $5,120')+'. It phases out at higher incomes (around $252,000 MAGI). Employer-provided adoption assistance may also be excluded from income.')\n      + H('Health Savings Accounts (Form 8889)')\n      + P('To contribute to an HSA a taxpayer must have '+b('HDHP')+' coverage, no other disqualifying coverage, not be enrolled in Medicare, and not be claimed as a dependent. The 2026 contribution limits are '+b('$4,400 (self-only)')+' and '+b('$8,750 (family)')+', plus a '+b('$1,000')+' catch-up at age 55+.')\n      + UL([\n          'Contributions are deductible (or pre-tax through payroll); growth is tax-free.',\n          'Distributions for '+b('qualified medical expenses')+' are tax-free; reported on '+b('Form 1099-SA')+', with contributions on '+b('Form 5498-SA')+'.',\n          'Non-qualified distributions are taxable and may carry a 20% additional tax.'\n        ])\n      + H('Premium Tax Credit (Form 8962)')\n      + P('Clients who bought Marketplace coverage receive '+b('Form 1095-A')+' and must '+b('reconcile')+' any advance premium tax credit on '+b('Form 8962')+'. If advance credits were paid, the return '+b('must')+' be filed to reconcile them \\u2014 skipping it can block future advance payments.')\n      + SRC(['Pub 970 &amp; Form 8863','Form 1098-T','IRC \\u00a723 Adoption Credit','Pub 969 &amp; Form 8889','Form 8962 &amp; Pub 974']);\n\n    const m10 =\n      P('Module 10 covers the deductions that reduce income before the standard-vs-itemize decision \\u2014 including the brand-new '+b('Schedule 1-A')+' created for the OBBBA deductions.')\n      + H('Deduction vs. credit \\u2014 a quick reset')\n      + P('A '+b('deduction')+' lowers taxable income (value depends on bracket); a '+b('credit')+' lowers tax dollar-for-dollar. Module 10 is about deductions \\u2014 several claimed whether or not the client itemizes.')\n      + H('IRA, HSA, and student-loan deductions')\n      + UL([\n          b('Traditional IRA')+' \\u2014 deductibility depends on whether the taxpayer (or spouse) is covered by a workplace plan and on MAGI.',\n          b('HSA')+' \\u2014 direct (non-payroll) contributions are deductible up to the Module 9 limits.',\n          b('Student-loan interest')+' \\u2014 up to '+b('$2,500')+', phasing out between '+b('$85,000\\u2013$100,000')+' (single) and '+b('$175,000\\u2013$205,000')+' (joint).',\n          b('Educator expenses')+' and the '+b('Saver\\u2019s Credit')+' round out the common items.'\n        ])\n      + H('Schedule 1-A \\u2014 the new OBBBA deductions')\n      + P('For 2026 the IRS created '+b('Schedule 1-A')+' to claim four new deductions, which flow to '+b('Form 1040 / 1040-SR line 13b')+':')\n      + TBL(['Deduction','2026 limit'], [['Qualified tips','Up to $25,000'],['Qualified overtime','Up to $12,500 / $25,000 MFJ'],['Qualified passenger vehicle loan interest','Up to $10,000'],['Enhanced senior deduction','$6,000 per eligible individual']])\n      + teal(b('Label them correctly.')+' The Schedule 1-A items are '+b('not')+' \\u201cabove-the-line adjustments to income.\\u201d They are a distinct set of deductions claimed on Schedule 1-A and carried to line 13b, each with its own eligibility rules and phaseouts.')\n      + gold(b('Accuracy check \\u2014 the senior deduction.')+' The $6,000 enhanced senior deduction applies to a '+b('taxpayer (or spouse on a joint return) who is age 65 or older')+', and phases out above $75,000 MAGI (single) / $150,000 (MFJ). It is '+b('not')+' unlocked merely because the taxpayer '+b('claims a dependent')+' who is 65 or older \\u2014 a common and costly misconception.')\n      + SRC(['Schedule 1-A guidance &amp; Form 1040 instructions','Pub 590-A (IRA)','OBBBA (P.L. 119-21)','Rev. Proc. 2025-32']);\n\n    const m11 =\n      P('Module 11 is the judgment module: should the client take the standard deduction or itemize? You cannot answer without knowing what belongs on Schedule A and how the 2026 limits work.')\n      + H('The decision: standard vs. itemize')\n      + P('Compare total itemized deductions to the 2026 standard deduction ('+b('$16,100')+' single, '+b('$24,150')+' HOH, '+b('$32,200')+' MFJ) and take the '+b('greater')+'. Since OBBBA raised the standard deduction, far fewer clients itemize \\u2014 but high-tax, high-mortgage, or high-giving clients still can.')\n      + H('What goes on Schedule A')\n      + UL([\n          b('Medical &amp; dental')+' \\u2014 only the portion above '+b('7.5% of AGI')+'.',\n          b('State &amp; local taxes (SALT)')+' \\u2014 capped at '+b('$40,400')+' ($20,200 MFS) for 2026, phasing down above $505,000 MAGI toward a $10,000 floor.',\n          b('Mortgage interest')+' \\u2014 on acquisition debt within limits; reported on '+b('Form 1098')+'.',\n          b('Charitable contributions')+' \\u2014 cash and property, with a written acknowledgment for any gift of $250 or more.'\n        ])\n      + H('Special rules to watch in 2026')\n      + UL([\n          b('Casualty losses')+' \\u2014 deductible for '+b('federally and state-declared')+' disaster areas.',\n          b('Gambling losses')+' \\u2014 now limited to '+b('90% of losses')+' and never more than winnings.',\n          b('Moving expenses')+' \\u2014 only for qualifying '+b('military / intelligence-community')+' moves.',\n          b('Non-itemizers')+' may deduct up to '+b('$1,000 ($2,000 MFJ)')+' of cash charitable gifts.'\n        ])\n      + gold('For the highest earners (37% bracket), the '+b('tax benefit')+' of itemized deductions is capped \\u2014 build that into any high-income itemizing recommendation, and flag it for '+b('manager review')+'.')\n      + SRC(['Schedule A &amp; Pub 529','Pub 502 (medical)','Pub 526 (charitable)','Rev. Proc. 2025-32']);\n\n    return [\n      { id:'m1', num:'1', title:'Introduction to Taxation', minutes:12,\n        summary:'Build the mental model every return rests on: how the income tax works, how Form 1040 flows from gross income to refund, and how deductions and credits differ.',\n        objectives:['Explain the pay-as-you-go, progressive structure of the federal income tax.','Trace the Form 1040 flow from gross income through AGI to taxable income and total tax.','Distinguish deductions from credits, and refundable from nonrefundable credits.','Recall the 2026 standard-deduction amounts and basic filing thresholds.'],\n        bodyHtml:m1,\n        quiz:[\n          { id:'L1Q1', prompt:'The federal income tax is \"pay-as-you-go.\" Which mechanism reflects that principle?', choices:['Paying the entire year\\u2019s tax on April 15','Withholding from paychecks and quarterly estimated payments during the year','Paying tax only when the IRS sends a bill','Deducting tax from next year\\u2019s refund'], correctIndex:1, rationale:'Pay-as-you-go means tax is collected throughout the year via employer withholding and estimated payments, not in a lump sum after year-end.' },\n          { id:'L1Q2', prompt:'On Form 1040, which figure is calculated first?', choices:['Taxable income','Adjusted Gross Income (AGI)','Total tax','Total (gross) income'], correctIndex:3, rationale:'The flow starts with total/gross income; adjustments then produce AGI, deductions produce taxable income, and tax and credits follow.' },\n          { id:'L1Q3', prompt:'For a client in the 12% bracket, which provides the larger tax savings?', choices:['A $1,000 deduction','A $1,000 credit','They are identical','It depends on filing status'], correctIndex:1, rationale:'A credit reduces tax dollar-for-dollar ($1,000), while a $1,000 deduction only reduces taxable income \\u2014 worth about $120 at 12%.' },\n          { id:'L1Q4', prompt:'A refundable credit is distinctive because it:', choices:['Can only reduce tax to zero','Can reduce tax below zero and generate a refund','Applies only to business returns','Must be carried forward to next year'], correctIndex:1, rationale:'Refundable credits (e.g., EITC) can exceed the tax owed and produce a refund; nonrefundable credits stop at zero.' },\n          { id:'L1Q5', prompt:'For Tax Year 2026, the base standard deduction for a Single filer is:', choices:['$13,850','$16,100','$24,150','$32,200'], correctIndex:1, rationale:'TY2026 base standard deductions: Single/MFS $16,100, HOH $24,150, MFJ/QSS $32,200.' }\n        ] },\n      { id:'m2', num:'2', title:'Filing Status', minutes:11,\n        summary:'The five filing statuses, why December 31 is the only date that matters, the Head of Household tests, and the Married Filing Separately traps.',\n        objectives:['Determine marital status as of the last day of the tax year.','Match a taxpayer to the correct one of the five filing statuses.','Apply the Head of Household and \"considered unmarried\" tests.','Explain the MFS itemizing rule and the TY2026 standard deductions.'],\n        bodyHtml:m2,\n        quiz:[\n          { id:'L2Q1', prompt:'A couple\\u2019s divorce becomes final on December 20, 2026. What is their status for the 2026 return?', choices:['Married Filing Jointly','Married Filing Separately','Unmarried (Single or HOH if qualified)','They may choose either married or single'], correctIndex:2, rationale:'Marital status is set on December 31. A divorce final by year-end means they are unmarried for the whole year.' },\n          { id:'L2Q2', prompt:'Which is required to file as Head of Household?', choices:['Being married and filing jointly','Paying more than half the cost of keeping up a home with a qualifying person','Having any dependent, regardless of living arrangement','Earning below a fixed income cap'], correctIndex:1, rationale:'HOH requires being unmarried/considered unmarried, paying more than half the home\\u2019s cost, and having a qualifying person (a dependent parent need not live with the taxpayer).' },\n          { id:'L2Q3', prompt:'On a Married Filing Separately return, one spouse itemizes deductions. The other spouse\\u2019s standard deduction is:', choices:['The full amount for their status','Half the normal amount','$0','Increased by $2,050'], correctIndex:2, rationale:'If one MFS spouse itemizes, the other\\u2019s standard deduction is $0 \\u2014 they effectively must itemize too.' },\n          { id:'L2Q4', prompt:'Qualifying Surviving Spouse status generally requires:', choices:['That the spouse died this year','A dependent child and an unremarried taxpayer maintaining the home, for up to two years after the spouse\\u2019s death','That the taxpayer is over 65','That there are no dependents'], correctIndex:1, rationale:'QSS is available for the two years after the year of death if the taxpayer has not remarried and maintains a home for a dependent child.' },\n          { id:'L2Q5', prompt:'A still-married taxpayer wants to file as Head of Household. Besides paying over half the home cost and having a qualifying child in the home, they must show that their spouse:', choices:['Earned less than they did','Did not live in the home during the last six months of the year','Agreed in writing','Filed a joint return'], correctIndex:1, rationale:'To be \"considered unmarried,\" the spouse must not have lived in the home during the last six months of the year (plus the other three conditions).' }\n        ] },\n      { id:'m3', num:'3', title:'Dependents', minutes:13,\n        summary:'The three universal dependent tests, the five Qualifying Child tests, the four Qualifying Relative tests, and the traps that catch preparers.',\n        objectives:['List the three tests that apply to every dependent.','Apply the five Qualifying Child tests, including the age and support rules.','Apply the four Qualifying Relative tests, including the TY2026 gross-income limit.','Distinguish a qualifying child from a qualifying relative.'],\n        bodyHtml:m3,\n        quiz:[\n          { id:'L3Q1', prompt:'Which set correctly states the Qualifying Child age test?', choices:['Under 18 only','Under 19, or under 24 and a full-time student, or any age if permanently and totally disabled','Under 21 in all cases','Under 24 regardless of student status'], correctIndex:1, rationale:'A qualifying child must be under 19, under 24 and a full-time student, or any age if permanently and totally disabled.' },\n          { id:'L3Q2', prompt:'For Tax Year 2026, the gross income limit for a Qualifying Relative is:', choices:['$4,700','$5,300','$16,100','There is no income limit'], correctIndex:1, rationale:'A qualifying relative must have gross income under $5,300 for TY2026 (tax-exempt income is excluded).' },\n          { id:'L3Q3', prompt:'Which is NOT one of the three tests that apply to every dependent?', choices:['Dependent Taxpayer Test','Joint Return Test','Citizen or Resident Test','Gross Income Test'], correctIndex:3, rationale:'All dependents must pass the Dependent Taxpayer, Joint Return, and Citizen/Resident tests. The gross-income test applies only to qualifying relatives.' },\n          { id:'L3Q4', prompt:'The Qualifying Child residency test requires that the child:', choices:['Lived with the taxpayer the entire year','Lived with the taxpayer more than half the year','Was claimed on last year\\u2019s return','Is under age 13'], correctIndex:1, rationale:'A qualifying child must have lived with the taxpayer for more than half the year, with limited exceptions.' },\n          { id:'L3Q5', prompt:'Under the Qualifying Child support test, who must NOT provide more than half of the child\\u2019s support?', choices:['The taxpayer','The child (the child must not provide more than half of their own support)','A grandparent','The other parent'], correctIndex:1, rationale:'For a qualifying child, the test is that the child did not provide more than half of their own support \\u2014 different from the qualifying-relative test.' }\n        ] },\n      { id:'m4', num:'4', title:'W-2, Tips & Fringe Benefits', minutes:14,\n        summary:'Reading the Form W-2, the new No Tax on Tips and No Tax on Overtime deductions, and telling taxable fringe benefits from excluded ones.',\n        objectives:['Explain why W-2 Box 1 often differs from Boxes 3 and 5.','Apply the OBBBA qualified-tips and qualified-overtime deductions and their limits.','Identify taxable versus excluded fringe benefits.','Recognize that tips and overtime remain subject to FICA.'],\n        bodyHtml:m4,\n        quiz:[\n          { id:'L4Q1', prompt:'A 2026 Form W-2 shows Box 1 lower than Box 3. The most likely explanation is:', choices:['A payroll error in the Social Security wage base','Pre-tax 401(k) deferrals reduce Box 1 but not Box 3','Box 1 is the employee\\u2019s net take-home pay','The employer\\u2019s FICA match is added to Box 3'], correctIndex:1, rationale:'Pre-tax 401(k) deferrals (Box 12, Code D) lower federal taxable wages in Box 1 but stay subject to Social Security tax, so they remain in Box 3.' },\n          { id:'L4Q2', prompt:'Under OBBBA \\u00a770201, the maximum qualified-tips deduction for 2026 is:', choices:['$12,500','$15,750','$25,000','$32,200'], correctIndex:2, rationale:'The qualified tips deduction is up to $25,000 for tax years 2025\\u20132028.' },\n          { id:'L4Q3', prompt:'The qualified-tips deduction reduces:', choices:['Both income tax and FICA','Income tax only \\u2014 tips still owe FICA','FICA only','Only the Medicare portion of FICA'], correctIndex:1, rationale:'The deduction applies to income tax only; tips remain fully subject to Social Security and Medicare taxes.' },\n          { id:'L4Q4', prompt:'For the qualified-overtime deduction, the \"qualified\" amount is:', choices:['The entire overtime paycheck','The full time-and-a-half rate for hours over 40','Only the premium half of time-and-a-half pay','All pay for hours over 35 per week'], correctIndex:2, rationale:'Only the premium \"half\" portion of time-and-a-half pay qualifies, up to the annual limit, and it must be separately reported.' },\n          { id:'L4Q5', prompt:'Which employer-provided benefit is a taxable fringe benefit included in Box 1?', choices:['HSA contributions within limits','Cash gift cards given as incentives','Employer-paid HDHP premiums','Educational assistance up to $5,250'], correctIndex:1, rationale:'Cash and cash-equivalent gift cards are always taxable; the other items are generally excluded when requirements are met.' }\n        ] },\n      { id:'m5', num:'5', title:'Investment Income & Capital Gains', minutes:15,\n        summary:'Interest and dividends, holding periods and 2026 capital-gain rates, the $3,000 loss limit, the wash-sale rule, and 1099-K reporting.',\n        objectives:['Distinguish taxable and tax-exempt interest and their effect on Social Security.','Reconcile ordinary and qualified dividends on Form 1099-DIV.','Apply holding-period, capital-loss, and wash-sale rules.','State the reinstated 1099-K reporting threshold.'],\n        bodyHtml:m5,\n        quiz:[\n          { id:'L5Q1', prompt:'Tax-exempt municipal bond interest (Line 2a):', choices:['Is ignored for every tax calculation','Is added back when figuring provisional income for Social Security','Reduces taxable Social Security','Only matters if it exceeds $5,300'], correctIndex:1, rationale:'Municipal interest is federally tax-free but is included in the provisional-income formula that determines Social Security taxability.' },\n          { id:'L5Q2', prompt:'On a 1099-DIV, Box 1b (qualified dividends) relative to Box 1a (ordinary dividends) is:', choices:['Added to Box 1a for the total','A subset of Box 1a taxed at preferential rates','Reported on Schedule C','Always equal to Box 1a'], correctIndex:1, rationale:'Box 1b is a subset of Box 1a and is taxed at the 0/15/20% capital-gains rates; the boxes are not added together.' },\n          { id:'L5Q3', prompt:'Long-term capital-gain treatment requires a holding period of:', choices:['Exactly 365 days','More than one year','At least 18 months','More than two years'], correctIndex:1, rationale:'Assets must be held more than one year (366+ days) for long-term treatment.' },\n          { id:'L5Q4', prompt:'A taxpayer has a net capital loss of $7,500 for 2026. How much can offset ordinary income this year?', choices:['$0','$1,500','$3,000','$7,500'], correctIndex:2, rationale:'IRC \\u00a71211 limits the deduction to $3,000 ($1,500 MFS); the remaining $4,500 carries forward.' },\n          { id:'L5Q5', prompt:'A client sells stock at a loss and rebuys substantially identical shares 21 days later. The loss is:', choices:['Fully deductible now','Disallowed and added to the basis of the new shares','Converted to a long-term gain','Deductible only next year automatically'], correctIndex:1, rationale:'The wash-sale rule disallows the loss when identical securities are repurchased within 30 days before or after; the loss is added to the replacement shares\\u2019 basis.' }\n        ] },\n      { id:'m6', num:'6', title:'Retirement & Social Security', minutes:14,\n        summary:'RMDs under SECURE 2.0, Form 1099-R codes, qualified Roth distributions, provisional income, and how much Social Security is taxable.',\n        objectives:['Determine the correct RMD starting age under SECURE 2.0.','Interpret Form 1099-R distribution codes.','Compute provisional income and the taxable share of Social Security.','Identify the conditions for a qualified Roth distribution.'],\n        bodyHtml:m6,\n        quiz:[\n          { id:'L6Q1', prompt:'John turns 73 in May 2026. Under SECURE 2.0, does he have a 2026 RMD?', choices:['No \\u2014 RMDs now start at 75 for everyone','No \\u2014 the age is still 70\\u00bd','Yes \\u2014 the RMD age is 73 for this fact pattern','Only if he owns more than 5% of his employer'], correctIndex:2, rationale:'SECURE 2.0 sets the RMD age at 73 for those born 1951\\u20131959; turning 73 in 2026 creates a 2026 RMD.' },\n          { id:'L6Q2', prompt:'Code 1 in Box 7 of Form 1099-R indicates:', choices:['A qualified Roth distribution','A normal distribution after 59\\u00bd','An early distribution with no known exception (possible 10% penalty)','A direct rollover'], correctIndex:2, rationale:'Code 1 is an early distribution with no known exception, generally subject to the additional 10% tax via Form 5329.' },\n          { id:'L6Q3', prompt:'Provisional income equals:', choices:['Gross wages + standard deduction + business losses','AGI excluding Social Security + tax-exempt interest + \\u00bd Social Security benefits','Net investment income + SE tax + Child Tax Credit','Total Social Security \\u2212 itemized deductions'], correctIndex:1, rationale:'Provisional income = AGI (excluding SS) + tax-exempt interest + one-half of Social Security benefits.' },\n          { id:'L6Q4', prompt:'The maximum portion of Social Security benefits that can be taxable is:', choices:['15%','50%','85%','100%'], correctIndex:2, rationale:'No more than 85% of Social Security benefits is ever included in taxable income.' },\n          { id:'L6Q5', prompt:'A Roth IRA distribution is tax-free (qualified) when:', choices:['The owner is 59\\u00bd and the account has been open 5 years','The owner is 73 and the account is 2 years old','The owner is 55 buying a first home','The owner has no other IRAs'], correctIndex:0, rationale:'A qualified Roth distribution generally requires the 5-year holding period AND age 59\\u00bd (or another qualifying event).' }\n        ] },\n      { id:'m7', num:'7', title:'Self-Employment Income', minutes:13,\n        summary:'Schedule C profit, self-employment tax and the wage base, filing and 1099 thresholds, and quarterly estimated payments.',\n        objectives:['Compute self-employment tax using the 92.35% base.','State the 2026 Social Security wage base and filing threshold.','Apply the raised 1099-NEC and reinstated 1099-K thresholds.','Explain quarterly estimated payments on Form 1040-ES.'],\n        bodyHtml:m7,\n        quiz:[\n          { id:'L7Q1', prompt:'SE tax on $50,000 of net profit is computed as:', choices:['15.3% of $50,000','15.3% of 92.35% of net profit','7.65% after the standard deduction','12.4% of profit up to $168,600'], correctIndex:1, rationale:'SE tax is 15.3% of net earnings, defined as 92.35% of net profit: $50,000 \\u00d7 0.9235 \\u00d7 0.153 \\u2248 $7,065.' },\n          { id:'L7Q2', prompt:'The 2026 Social Security wage base (OASDI cap) used in this course is:', choices:['$145,000','$161,000','$168,600','$184,500'], correctIndex:3, rationale:'Earnings above the $184,500 wage base are subject only to the 2.9% Medicare portion.' },\n          { id:'L7Q3', prompt:'A taxpayer must file a return when net self-employment earnings reach at least:', choices:['$5','$400','$2,000','$16,100'], correctIndex:1, rationale:'Net self-employment earnings of $400 or more create a filing requirement regardless of other income.' },\n          { id:'L7Q4', prompt:'Under OBBBA \\u00a770433, the 2026 Form 1099-NEC reporting threshold is:', choices:['$400','$600','$2,000','$5,300'], correctIndex:2, rationale:'The 1099-NEC reporting threshold rose from $600 to $2,000 beginning in 2026.' },\n          { id:'L7Q5', prompt:'Self-employed taxpayers pay quarterly estimated taxes using:', choices:['Form 1040-V','Form 1040-ES','Form 8867','Form W-4'], correctIndex:1, rationale:'Form 1040-ES is used to compute and pay quarterly estimated taxes.' }\n        ] },\n      { id:'m8', num:'8', title:'Family Credits & Due Diligence', minutes:16,\n        summary:'CTC/ACTC/ODC, EITC, and the Child & Dependent Care Credit \\u2014 plus the Form 8867 due-diligence rules and the manager-review triggers that keep the firm out of trouble.',\n        objectives:['Apply the 2026 CTC, ACTC, and ODC amounts and phaseouts.','Explain the Child & Dependent Care Credit\\u2019s new 50% rate and expense limits.','List the credits and status covered by Form 8867 due diligence.','Recognize fraud red flags that require manager review.'],\n        bodyHtml:m8,\n        quiz:[\n          { id:'L8Q1', prompt:'For 2026, the Child Tax Credit is:', choices:['$1,000 per child','$2,000 per child','$2,200 per qualifying child under 17','$2,500 per qualifying child'], correctIndex:2, rationale:'OBBBA set the CTC at $2,200 per qualifying child under 17 for 2025\\u20132026 (indexed thereafter), with up to $1,700 refundable.' },\n          { id:'L8Q2', prompt:'A taxpayer supports an elderly parent who is a qualifying relative but not CTC-eligible. Which credit may apply?', choices:['Child Tax Credit','Credit for Other Dependents ($500)','Additional Child Tax Credit','Earned Income Tax Credit'], correctIndex:1, rationale:'The $500 nonrefundable Credit for Other Dependents applies to dependents who are not qualifying children for the CTC.' },\n          { id:'L8Q3', prompt:'Under OBBBA, the top Child & Dependent Care Credit rate for 2026 is:', choices:['20%','35%','50%','100%'], correctIndex:2, rationale:'OBBBA raised the maximum rate from 35% to 50% beginning in 2026; the expense limits remain $3,000 / $6,000.' },\n          { id:'L8Q4', prompt:'Form 8867 paid-preparer due diligence applies to all of these EXCEPT:', choices:['EITC','Child Tax Credit / ODC','American Opportunity Credit','The standard deduction'], correctIndex:3, rationale:'Form 8867 covers EITC, CTC/ACTC/ODC, AOTC, and Head of Household \\u2014 not the standard deduction.' },\n          { id:'L8Q5', prompt:'Due-diligence records supporting Form 8867 must be retained for:', choices:['1 year','3 years','7 years','Indefinitely'], correctIndex:1, rationale:'Records must be kept for three years; a failure carries an IRC \\u00a76695(g) penalty per credit, per return.' }\n        ] },\n      { id:'m9', num:'9', title:'Education, Adoption & Healthcare Credits', minutes:16,\n        summary:'AOTC and LLC from Form 1098-T, the adoption credit, HSAs on Form 8889, and reconciling the Premium Tax Credit on Form 8962 \\u2014 with the double-benefit traps flagged.',\n        objectives:['Distinguish the AOTC from the LLC and apply the no-double-benefit rule.','State the 2026 adoption credit and HSA limits.','Explain HSA eligibility and the forms involved.','Reconcile advance Premium Tax Credit on Form 8962.'],\n        bodyHtml:m9,\n        quiz:[\n          { id:'L9Q1', prompt:'The American Opportunity Tax Credit is:', choices:['Fully nonrefundable','40% refundable (up to $1,000), for the first four years','Available for unlimited years','Only for graduate study'], correctIndex:1, rationale:'The AOTC is up to $2,500 per student, 40% refundable (up to $1,000), limited to the first four years of postsecondary study.' },\n          { id:'L9Q2', prompt:'Which is TRUE about the Lifetime Learning Credit?', choices:['It is partially refundable','It is limited to four years','It is up to $2,000 per return and nonrefundable','It requires half-time enrollment'], correctIndex:2, rationale:'The LLC is up to $2,000 per return (20% of up to $10,000), nonrefundable, with no year or enrollment-level limit.' },\n          { id:'L9Q3', prompt:'The 2026 HSA contribution limit for family coverage is:', choices:['$4,400','$7,500','$8,300','$8,750'], correctIndex:3, rationale:'For 2026 the HSA limits are $4,400 (self-only) and $8,750 (family), plus a $1,000 catch-up at 55+.' },\n          { id:'L9Q4', prompt:'For 2026 the Adoption Credit is:', choices:['Fully nonrefundable, max $10,000','Partially refundable up to $5,120, with max qualified expenses of $17,670','A $2,000 flat credit','Available only to employers'], correctIndex:1, rationale:'For 2026 the maximum qualified expenses are $17,670, and up to $5,120 of the credit is refundable.' },\n          { id:'L9Q5', prompt:'A client had advance premium tax credits paid to their Marketplace insurer. To reconcile, they file:', choices:['Form 2441','Form 8863','Form 8962 using Form 1095-A','Schedule 8812'], correctIndex:2, rationale:'Advance PTC is reconciled on Form 8962 using Form 1095-A; the return must be filed to reconcile.' }\n        ] },\n      { id:'m10', num:'10', title:'Deductions, IRA/HSA & Schedule 1-A', minutes:14,\n        summary:'The IRA, HSA, and student-loan deductions, plus the brand-new Schedule 1-A for tips, overtime, vehicle-loan interest, and the senior deduction \\u2014 labeled correctly and with the senior-deduction myth corrected.',\n        objectives:['Apply the 2026 student-loan interest deduction and phaseouts.','Identify the four Schedule 1-A deductions and where they flow.','State the senior deduction rule correctly.','Distinguish deductions from credits by value.'],\n        bodyHtml:m10,\n        quiz:[\n          { id:'L10Q1', prompt:'The maximum student-loan interest deduction for 2026 is:', choices:['$1,000','$2,500','$4,000','No limit'], correctIndex:1, rationale:'The student-loan interest deduction is capped at $2,500, phasing out at higher MAGI.' },\n          { id:'L10Q2', prompt:'Which is claimed on the new Schedule 1-A for 2026?', choices:['Student-loan interest','Qualified tips','HSA deduction','IRA deduction'], correctIndex:1, rationale:'Qualified tips, qualified overtime, qualified vehicle loan interest, and the enhanced senior deduction are claimed on Schedule 1-A and flow to line 13b.' },\n          { id:'L10Q3', prompt:'Which statement about the $6,000 senior deduction is correct?', choices:['It is unlocked by claiming a dependent age 65+','It applies to a taxpayer or spouse who is age 65+, subject to a MAGI phaseout','It replaces the standard deduction','It is a refundable credit'], correctIndex:1, rationale:'The senior deduction is for a taxpayer (or spouse on a joint return) who is 65+. It is NOT triggered by claiming a 65+ dependent.' },\n          { id:'L10Q4', prompt:'Schedule 1-A deductions are best described as:', choices:['Above-the-line adjustments to income','A distinct set of deductions carried to Form 1040 line 13b','Itemized deductions on Schedule A','Nonrefundable credits'], correctIndex:1, rationale:'The Schedule 1-A items are a separate set of deductions flowing to line 13b \\u2014 not \\u201cabove-the-line adjustments.\\u201d' },\n          { id:'L10Q5', prompt:'For a client in the 22% bracket, a $1,000 deduction vs. a $1,000 credit:', choices:['Both save $1,000','The deduction saves about $220; the credit saves $1,000','The deduction saves $1,000; the credit saves $220','Both save $220'], correctIndex:1, rationale:'A deduction reduces taxable income (\\u2248$220 at 22%); a credit reduces tax dollar-for-dollar ($1,000).' }\n        ] },\n      { id:'m11', num:'11', title:'Itemized Deductions & Strategic Choice', minutes:15,\n        summary:'The standard-vs-itemize decision, what belongs on Schedule A, and the 2026 special rules \\u2014 SALT, medical, charitable, casualty, gambling, and moving \\u2014 that change the answer.',\n        objectives:['Make the standard-vs-itemize decision using 2026 amounts.','Apply the medical floor and 2026 SALT cap.','Apply the 2026 gambling-loss and moving-expense rules.','Flag high-income itemized limitations for review.'],\n        bodyHtml:m11,\n        quiz:[\n          { id:'L11Q1', prompt:'Medical and dental expenses are deductible only to the extent they exceed:', choices:['2% of AGI','7.5% of AGI','10% of AGI','$5,300'], correctIndex:1, rationale:'Only unreimbursed medical/dental expenses above 7.5% of AGI are deductible on Schedule A.' },\n          { id:'L11Q2', prompt:'The 2026 SALT deduction cap is:', choices:['$10,000','$20,200','$40,400 ($20,200 MFS)','Unlimited'], correctIndex:2, rationale:'For 2026 the SALT cap is $40,400 ($20,200 MFS), phasing down above $505,000 MAGI toward a $10,000 floor.' },\n          { id:'L11Q3', prompt:'For 2026, gambling losses are:', choices:['Fully deductible','Limited to 90% of losses and never more than winnings','Not deductible at all','Deductible up to $3,000'], correctIndex:1, rationale:'OBBBA limits the gambling-loss deduction to 90% of losses, and it can never exceed gambling winnings.' },\n          { id:'L11Q4', prompt:'When itemized deductions total less than the standard deduction, the client should:', choices:['Always itemize','Take the standard deduction','Split the difference','File separately'], correctIndex:1, rationale:'Take the greater of the standard deduction or total itemized deductions.' },\n          { id:'L11Q5', prompt:'For 2026, the moving-expense deduction is generally available only to:', choices:['Anyone who relocates for a job','Qualifying military / intelligence-community members','Homeowners','First-time filers'], correctIndex:1, rationale:'Moving expenses are limited to qualifying military and intelligence-community circumstances.' }\n        ] },\n      { id:'msc', num:'SC', title:'Schedule C Fundamentals', minutes:15,\n        summary:'The sole-proprietor essentials the AFTR exam targets \\u2014 business vs. hobby, the $400 trigger, recordkeeping, meals, home office, cost recovery, and vehicle rules with verified 2026 figures.',\n        objectives:['Distinguish a business from a hobby and apply the $400 filing trigger.','Apply the 2026 meals, home-office, and vehicle rules.','Explain Section 179, 100% bonus depreciation, and the ordering rule.','Apply the 2026 OBBBA information-reporting thresholds.'],\n        bodyHtml:\n          P('Schedule C reports the profit or loss from a business run as a '+b('sole proprietorship')+'. This module covers the judgment calls the AFTR exam targets \\u2014 and pairs with the hands-on Schedule C Decision Lab.')\n          + H('Business vs. hobby')\n          + P('An activity is a '+b('business')+' if it is pursued with a good-faith intention of making a profit. The IRS weighs nine factors, including whether it is carried on in a businesslike manner, the time and effort involved, and whether the taxpayer depends on the income for their livelihood.')\n          + gold(b('Key trap.')+' If an activity is ruled a '+b('hobby')+', the income is still fully reportable \\u2014 but under current law most expenses are '+b('not deductible')+'. And the '+b('$400')+' self-employment filing trigger applies to any self-employed activity regardless of hobby status.')\n          + H('The $400 filing trigger')\n          + P('A federal return is required when '+b('net earnings from self-employment are $400 or more')+'. Net earnings are generally '+b('92.35%')+' of net profit, but the $400 net-profit floor is the critical threshold for the filing determination.')\n          + H('Recordkeeping \\u2014 the burden is on the taxpayer')\n          + UL([\n              b('Contemporaneous records')+' \\u2014 created at or near the time of the transaction.',\n              b('Ordinary and necessary')+' \\u2014 records must show the expense is common in the industry and helpful to the business.',\n              b('Income reconciliation')+' \\u2014 keep 1099-K, 1099-NEC, and cash receipts to match reported gross income.'\n            ])\n          + H('Business meals')\n          + P('For 2026, qualifying business meals are '+b('50% deductible')+'. Document the business purpose and the participants present for every meal claimed.')\n          + H('Business use of the home')\n          + P('The space must be used '+b('exclusively and regularly')+' for business. Then choose a method:')\n          + TBL(['Feature','Regular method','Simplified method'], [['Calculation','% of home square footage','$5/sq ft (up to 300 sq ft)'],['Records','All actual home expenses','No actual-expense tracking'],['Depreciation','Mandatory on business portion','Not allowed'],['Maximum','Limited by business net income','$1,500 (300 \\u00d7 $5)']])\n          + H('Cost recovery: Section 179 and bonus depreciation')\n          + P('For 2026, '+b('Section 179')+' expensing is capped at '+b('$2,560,000')+' (phasing out above $4,090,000), and '+b('100% bonus depreciation')+' is available. The '+b('ordering rule')+' applies Section 179 first, then bonus depreciation, then regular MACRS \\u2014 letting most equipment placed in service by Dec 31, 2026 be fully expensed.')\n          + H('Business vehicle expenses')\n          + P('Taxpayers choose the '+b('standard mileage rate')+' \\u2014 '+b('72.5\\u00a2 per mile')+' for 2026 (Notice 2026-10) \\u2014 or the '+b('actual expense')+' method. Vehicles are '+b('listed property')+', so a contemporaneous log of date, mileage (business vs. personal), and business purpose is required.')\n          + H('2026 reporting changes (OBBBA)')\n          + UL([\n              b('1099-NEC threshold')+' rose from $600 to '+b('$2,000')+' (\\u00a770433) \\u2014 but every dollar of business income is still reportable.',\n              b('1099-K')+' is reinstated at '+b('$20,000 and 200 transactions')+' (\\u00a770432).',\n              b('Enhanced senior deduction')+' of $6,000 (\\u00a770103) can cut a self-employed senior\\u2019s liability even with high Schedule C profit.'\n            ])\n          + SRC(['Schedule C &amp; Instructions','Pub 587 (home office)','Notice 2026-10 (mileage)','Notice 2026-11 (bonus)','Rev. Proc. 2025-32','OBBBA \\u00a770432/\\u00a770433']),\n        quiz:[\n          { id:'LSCQ1', prompt:'A sole proprietor\\u2019s only income is a $425 net profit on Schedule C. Must they file a federal return?', choices:['No \\u2014 it is below the standard deduction','No \\u2014 it is under the $2,000 1099 threshold','Yes \\u2014 net self-employment earnings are at least $400','Only if they are over age 65'], correctIndex:2, rationale:'A return is required when net self-employment earnings are $400 or more \\u2014 the SE-tax filing floor.' },\n          { id:'LSCQ2', prompt:'For 2026, qualifying business meals are deductible at:', choices:['0%','50%','80%','100%'], correctIndex:1, rationale:'Business meals are 50% deductible for 2026, with the business purpose and participants documented.' },\n          { id:'LSCQ3', prompt:'Under the simplified home-office method, the deduction is:', choices:['A percentage of actual home expenses','$5 per sq ft up to 300 sq ft ($1,500 max)','Unlimited by net income','Depreciation only'], correctIndex:1, rationale:'The simplified method is $5/sq ft up to 300 sq ft (max $1,500), with no depreciation and no tracking of actual expenses.' },\n          { id:'LSCQ4', prompt:'The 2026 standard mileage rate for business driving is:', choices:['65.5\\u00a2','67\\u00a2','70\\u00a2','72.5\\u00a2'], correctIndex:3, rationale:'The 2026 standard mileage rate is 72.5\\u00a2 per mile (Notice 2026-10); vehicles are listed property requiring a contemporaneous log.' },\n          { id:'LSCQ5', prompt:'A client places $50,000 of qualifying machinery in service in 2026. The maximum bonus-depreciation percentage is:', choices:['40%','60%','80%','100%'], correctIndex:3, rationale:'100% bonus depreciation applies for 2026 (OBBBA / Notice 2026-11), taken after Section 179 under the ordering rule.' }\n        ] },\n    ];\n  }\n\n  openLesson = (id) => this.setState({ view:'lesson', activeLesson:id, lessonMode:'read', lessonAnswers:{}, lessonSubmitted:false });\n  startLessonQuiz = () => this.setState({ lessonMode:'quiz', lessonAnswers:{}, lessonSubmitted:false });\n  pickLesson = (qid, idx) => this.setState(s => ({ lessonAnswers:{ ...s.lessonAnswers, [qid]: idx } }));\n  retryLessonQuiz = () => this.setState({ lessonAnswers:{}, lessonSubmitted:false });\n  submitLessonQuiz = () => {\n    const lesson = this.lessons.find(l => l.id === this.state.activeLesson);\n    if (!lesson) return;\n    let correct = 0;\n    lesson.quiz.forEach(q => { if (this.state.lessonAnswers[q.id] === q.correctIndex) correct++; });\n    const pct = Math.round(correct / lesson.quiz.length * 100);\n    const pass = pct >= 80;\n    this.setState(s => {\n      const progress = { ...s.progress };\n      if (pass) {\n        const prev = progress[lesson.id];\n        progress[lesson.id] = { done:true, score: Math.max(pct, prev ? prev.score : 0) };\n      }\n      try { localStorage.setItem('ogo-phase1', JSON.stringify(progress)); } catch (e) {}\n      return { lessonSubmitted:true, progress };\n    });\n  };\n\n  phase2Bank = [\n    { id:'P2-1', sec:'W-2, Tips & Overtime', prompt:'A taxpayer reviews their 2026 Form W-2 and notices Box 1 (federal taxable wages) is significantly lower than Box 3 (Social Security wages). How should you explain the discrepancy?', choices:['The employer likely made a payroll error on the Social Security wage base.','Box 1 is reduced by pre-tax 401(k) deferrals, whereas Box 3 is not.','Box 1 excludes health premiums while Box 3 includes them.','The difference is the 7.65% employer FICA match.'], correctIndex:1, rationale:'Pre-tax 401(k) deferrals (Code D in Box 12) reduce Box 1 but remain subject to Social Security and Medicare tax, so they stay in Box 3.' },\n    { id:'P2-2', sec:'W-2, Tips & Overtime', prompt:'Under OBBBA \\u00a770201, the maximum annual \"Qualified Tips\" deduction for an eligible worker in 2026 is:', choices:['$12,500','$15,750','$25,000','$32,200'], correctIndex:2, rationale:'OBBBA \\u00a770201 created a deduction for qualified tips up to $25,000 for tax years 2025\\u20132028.' },\n    { id:'P2-3', sec:'W-2, Tips & Overtime', prompt:'At what MAGI does the Qualified Tips Deduction begin to phase out for Married Filing Jointly in 2026?', choices:['$75,000','$150,000','$184,500','$300,000'], correctIndex:3, rationale:'The tips deduction phases out above $150,000 (single/HOH) and $300,000 (MFJ).' },\n    { id:'P2-4', sec:'W-2, Tips & Overtime', prompt:'Marcus earned $22,000 in tips in 2026 and claims the Qualified Tips Deduction. Regarding payroll tax:', choices:['He is exempt from the employee Social Security tax on the $22,000.','The $22,000 remains subject to Social Security and Medicare (FICA) taxes.','Only the Medicare portion applies to the deducted tips.','OBBBA gives a 50% FICA credit for deducted tips.'], correctIndex:1, rationale:'The deduction affects income tax only; tips stay fully subject to FICA.' },\n    { id:'P2-5', sec:'W-2, Tips & Overtime', prompt:'Under OBBBA \\u00a770202, which portion of overtime compensation is \"qualified\"?', choices:['The entire gross amount of any check that includes overtime.','The full time-and-a-half rate for hours over 40.','Only the premium \"half\" portion of time-and-a-half pay.','All pay for hours over 35 per week.'], correctIndex:2, rationale:'Only the premium half of time-and-a-half pay qualifies, subject to the annual limit.' },\n    { id:'P2-6', sec:'W-2, Tips & Overtime', prompt:'What administrative requirement must be met to claim the Qualified Overtime Deduction for 2026?', choices:['The taxpayer must belong to a union.','The premium overtime portion must be separately reported on the W-2 or 1099.','The employer must certify \"customary overtime\" with the DOL.','The taxpayer must not claim the standard deduction.'], correctIndex:1, rationale:'For 2026 the premium overtime portion must be separately reported on the information return to qualify.' },\n    { id:'P2-7', sec:'W-2, Tips & Overtime', prompt:'Which employer-provided benefit is a taxable fringe benefit includible in W-2 Box 1?', choices:['HSA contributions within statutory limits.','Cash \"gift cards\" provided as performance incentives.','Educational assistance up to $5,250.','Employer-paid HDHP premiums.'], correctIndex:1, rationale:'Cash and cash-equivalent gift cards are always taxable; the other items are generally excluded when requirements are met.' },\n    { id:'P2-8', sec:'Investment Income & Capital Gains', prompt:'Tax-exempt municipal bond interest is reported on Form 1040 Line 2a. How does it affect Social Security taxability?', choices:['It is excluded from all taxability calculations.','It is added to AGI and other items to determine provisional income.','It reduces the amount of Social Security subject to tax.','It only matters if interest exceeds $5,300.'], correctIndex:1, rationale:'Municipal interest is added back in the provisional-income formula used to test Social Security taxability.' },\n    { id:'P2-9', sec:'Investment Income & Capital Gains', prompt:'On a 1099-DIV, how should Box 1a (ordinary dividends) and Box 1b (qualified dividends) be reconciled?', choices:['Add 1a and 1b for total dividends.','Subtract 1b from 1a for the non-qualified portion.','Treat 1b as a subset of 1a taxed at preferential rates.','Report 1b on Schedule C and 1a on Schedule B.'], correctIndex:2, rationale:'Box 1b is a subset of Box 1a and receives preferential capital-gains rate treatment; the boxes are not added.' },\n    { id:'P2-10', sec:'Investment Income & Capital Gains', prompt:'To qualify for long-term capital-gain treatment, an asset must be held for:', choices:['Exactly 365 days.','More than one year.','At least 18 months.','More than two years.'], correctIndex:1, rationale:'Long-term treatment requires a holding period of more than one year (366+ days).' },\n    { id:'P2-11', sec:'Investment Income & Capital Gains', prompt:'Kim is single in 2026 with $42,000 of taxable income, including a $5,000 long-term capital gain. Her likely rate on the gain is:', choices:['0%','10%','15%','20%'], correctIndex:0, rationale:'For 2026, single filers with taxable income up to $49,450 are in the 0% long-term capital-gains bracket.' },\n    { id:'P2-12', sec:'Investment Income & Capital Gains', prompt:'A 2026 net capital loss of $7,500 can offset how ecurity benefits.','Net investment income + SE tax + Child Tax Credit.','Total Social Security \\u2212 itemized deductions.'], correctIndex:1, rationale:'Provisional income = AGI without Social Security + tax-exempt interest + one-half of benefits.' },\n    { id:'P2-17', sec:'Retirement & Social Security', prompt:'How does the OBBBA Senior Deduction interact with the standard deduction for a single 68-year-old in 2026?', choices:['It replaces the standard deduction entirely.','It is an additional $6,000 deduction if MAGI is below $75,000.','It is available only to seniors who itemize.','It is a dollar-for-dollar credit.'], correctIndex:1, rationale:'The enhanced senior deduction is a separate additional $6,000 deduction, phasing out at $75k/$150k MAGI.' },\n    { id:'P2-18', sec:'Retirement & Social Security', prompt:'For a Roth IRA distribution to be \"qualified\" (tax-free), which two conditions must generally be met?', choices:['Owner is 59\\u00bd and the account has been open 5 years.','Owner is 73 and the account is 2 years old.','Owner is 55 and buying a first home.','Owner has no other IRAs and is retired.'], correctIndex:0, rationale:'A qualified Roth distribution generally requires the 5-year holding period and age 59\\u00bd (or another qualifying event).' },\n    { id:'P2-19', sec:'Retirement & Social Security', prompt:'The maximum percentage of Social Security benefits that can be included in taxable income is:', choices:['15%','50%','85%','100%'], correctIndex:2, rationale:'No more than 85% of Social Security benefits is ever taxable under the federal formula.' },\n    { id:'P2-20', sec:'Self-Employment & Thresholds', prompt:'Per OBBBA \\u00a770433, the 2026 reporting threshold for issuing Form 1099-NEC to a contractor is:', choices:['$400','$600','$2,000','$5,300'], correctIndex:2, rationale:'The 1099-NEC reporting threshold rose from $600 to $2,000 beginning in 2026.' },\n    { id:'P2-21', sec:'Self-Employment & Thresholds', prompt:'Under OBBBA \\u00a770432, a third-party platform must issue a 1099-K for 2026 when aggregate payments exceed:', choices:['$600 with no transaction minimum.','$2,000 and 100 transactions.','$10,000 and 50 transactions.','$20,000 and 200 transactions.'], correctIndex:3, rationale:'The higher $20,000 and 200-transaction 1099-K threshold was reinstated.' },\n    { id:'P2-22', sec:'Self-Employment & Thresholds', prompt:'How is SE tax calculated for a sole proprietor with $50,000 of net profit in 2026?', choices:['15.3% of the full $50,000.','15.3% of 92.35% of net profit ($50,000 \\u00d7 0.9235 \\u00d7 0.153).','7.65% of net profit after the standard deduction.','12.4% of net profit up to $168,600.'], correctIndex:1, rationale:'SE tax applies to net earnings, defined as 92.35% of net profit: about $7,065 here.' },\n    { id:'P2-23', sec:'Self-Employment & Thresholds', prompt:'At what level of net self-employment earnings is a federal return required, even with no other income?', choices:['$5','$400','$2,000','$16,100'], correctIndex:1, rationale:'Net self-employment earnings of $400 or more create a filing requirement.' },\n    { id:'P2-24', sec:'Self-Employment & Thresholds', prompt:'The maximum self-employment earnings subject to the Social Security (OASDI) portion of SE tax for 2026 is:', choices:['$145,000','$161,000','$168,600','$184,500'], correctIndex:3, rationale:'This course uses a 2026 Social Security wage base of $184,500; earnings above are subject only to Medicare.' },\n    { id:'P2-25', sec:'Self-Employment & Thresholds', prompt:'Which form do self-employed taxpayers use to calculate and submit quarterly payments in 2026?', choices:['Form 1040-V','Form 1040-ES','Form 8867','Form W-4'], correctIndex:1, rationale:'Form 1040-ES is used to compute and pay quarterly estimated taxes.' },\n  ];\n\n  startP2Test = () => { this.setState({ view:'phase2test', p2Mode:'test', p2Answers:{}, p2Submitted:false, p2Seconds:2700 }); this.startP2Timer(); };\n  openP2Intro = () => { this.stopP2Ti el limit.' },\n    { id:'P3-8', sec:'Education, Adoption & Healthcare', prompt:'The 2026 HSA contribution limit for family coverage is:', choices:['$4,400','$7,500','$8,300','$8,750'], correctIndex:3, rationale:'For 2026 the HSA limits are $4,400 (self-only) and $8,750 (family), plus a $1,000 catch-up at age 55+.' },\n    { id:'P3-9', sec:'Education, Adoption & Healthcare', prompt:'For 2026 the Adoption Credit provides:', choices:['A flat $2,000 credit','Max qualified expenses of $17,670 with up to $5,120 refundable','A fully refundable $10,000 credit','A deduction, not a credit'], correctIndex:1, rationale:'For 2026 the maximum qualified adoption expenses are $17,670, and up to $5,120 of the credit is refundable.' },\n    { id:'P3-10', sec:'Education, Adoption & Healthcare', prompt:'A client received advance premium tax credits toward Marketplace coverage. To reconcile them, the preparer uses:', choices:['Form 2441 and W-2 Box 10','Form 8863 and Form 1098-T','Form 8962 and Form 1095-A','Schedule 8812'], correctIndex:2, rationale:'Advance PTC is reconciled on Form 8962 using the Form 1095-A; the return must be filed to reconcile.' },\n    { id:'P3-11', sec:'Deductions & Schedule 1-A', prompt:'The maximum student-loan interest deduction for 2026 is:', choices:['$1,000','$2,500','$4,000','Unlimited'], correctIndex:1, rationale:'The student-loan interest deduction is capped at $2,500, phasing out at higher MAGI ($85,000 single / $175,000 joint).' },\n    { id:'P3-12', sec:'Deductions & Schedule 1-A', prompt:'Which deduction is claimed on the new Schedule 1-A for 2026?', choices:['HSA deduction','IRA deduction','Qualified overtime','Student-loan interest'], correctIndex:2, rationale:'Qualified tips, qualified overtime, qualified vehicle loan interest, and the enhanced senior deduction are claimed on Schedule 1-A.' },\n    { id:'P3-13', sec:'Deductions & Schedule 1-A', prompt:'Schedule 1-A deductions flow to the return as:', choices:['Above-the-line adjustments to income
