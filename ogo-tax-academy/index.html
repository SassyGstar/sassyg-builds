document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Manrope';\n  font-style: normal;\n  font-weight: 800;\n  font-display: swap;\n  src: url(\"82747361-a15a-4ddc-8fe9-5173a4fc4f29\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  body { margin:0; background:#F7FAFB; font-family:\"Manrope\",Arial,sans-serif; color:#1F2937; -webkit-font-smoothing:antialiased; }\n  *{ box-sizing:border-box; }\n  ::-webkit-scrollbar{ width:10px; height:10px; }\n  ::-webkit-scrollbar-thumb{ background:#cdd9db; border-radius:8px; }\n  @media (max-width: 860px){\n    #ogo-shell{ flex-direction:column !important; }\n    #ogo-side{ width:100% !important; flex-direction:row !important; flex-wrap:wrap !important; align-items:center !important; gap:10px !important; padding:14px 16px !important; position:static !important; height:auto !important; }\n    #ogo-side nav{ flex-direction:row !important; flex-wrap:wrap !important; gap:6px !important; }\n    #ogo-sidenote{ display:none !important; }\n    #ogo-content{ padding:18px !important; }\n    .ogo-2col{ grid-template-columns:1fr !important; }\n    .ogo-3col{ grid-template-columns:1fr !important; }\n    .ogo-4col{ grid-template-columns:1fr 1fr !important; }\n  }\n  @keyframes ogoShimmer { 0%{ background-position:130% 0; } 100%{ background-position:-130% 0; } }\n  @keyframes ogoPop { 0%{ transform:scale(.965); } 60%{ transform:scale(1.012); } 100%{ transform:scale(1); } }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n\n\n<div id=\"ogo-shell\" style=\"display:flex; min-height:100vh; background:#F7FAFB;\">\n\n  <aside id=\"ogo-side\" style=\"width:262px; flex:none; background:#005A69; color:#fff; padding:24px 16px; display:flex; flex-direction:column; gap:22px; position:sticky; top:0; height:100vh;\">\n    <div style=\"display:flex; gap:12px; align-items:center;\">\n      <img src=\"4be91112-0ed2-49d0-b2ad-fc9f8d4916d7\" alt=\"OGO Accounting Services\" style=\"width:52px; height:52px; object-fit:contain; background:#fff; border-radius:11px; padding:5px;\">\n      <div style=\"line-height:1.2;\">\n        <strong style=\"display:block; font-size:15px; letter-spacing:.01em;\">OGO Tax Academy<\u002Fstrong>\n        <span style=\"display:block; font-size:11px; opacity:.82; margin-top:3px;\">AFSP Success System · TY2026<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <nav style=\"display:flex; flex-direction:column; gap:6px;\">\n      <sc-for list=\"{{ navItems }}\" as=\"item\" hint-placeholder-count=\"7\">\n        <button onclick=\"{{ item.onClick }}\" style=\"{{ item.style }}\">{{ item.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fnav>\n\n    <div id=\"ogo-sidenote\" style=\"margin-top:auto; background:rgba(255,255,255,.09); border:1px solid rgba(255,255,255,.16); padding:13px; border-radius:11px; font-size:11.5px; line-height:1.55;\">\n      <strong style=\"display:block; color:#F3D27A; margin-bottom:5px; letter-spacing:.02em;\">Compliance note<\u002Fstrong>\n      OGO Tax Academy is internal readiness training — not an IRS-approved CE provider. The official AFSP Record of Completion requires CE earned through an IRS-approved provider.\n    <\u002Fdiv>\n  <\u002Faside>\n\n  <main id=\"ogo-content\" style=\"flex:1; min-width:0; padding:30px 34px 60px; max-width:1280px; margin:0 auto; width:100%;\">\n\n    <header style=\"display:flex; justify-content:space-between; align-items:flex-end; gap:18px; margin-bottom:26px; flex-wrap:wrap;\">\n      <div>\n        <p style=\"text-transform:uppercase; letter-spacing:.13em; color:#00788A; font-size:11px; font-weight:800; margin:0 0 6px;\">Filing Season 2027 · Tax Year 2026<\u002Fp>\n        <h1 style=\"margin:0; font-size:29px; font-weight:800; letter-spacing:-.01em;\">{{ viewTitle }}<\u002Fh1>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:10px; align-items:center;\">\n        <span style=\"{{ trackBadgeStyle }}\">{{ trackLabel }}<\u002Fspan>\n        <button onclick=\"{{ openCert }}\" style=\"background:#fff; border:1px solid #00788A; color:#00788A; font-weight:800; padding:10px 14px; border-radius:9px; cursor:pointer; font-size:13px; white-space:nowrap;\">View certificate<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- ===================== DASHBOARD ===================== -->\n    <sc-if value=\"{{ isDashboard }}\" hint-placeholder-val=\"{{ true }}\">\n      <div>\n        <section class=\"ogo-2col\" style=\"display:grid; grid-template-columns:1.75fr .85fr; gap:20px;\">\n          <div style=\"background:#fff; border:1px solid #DCE6E8; border-radius:16px; padding:28px;\">\n            <p style=\"text-transform:uppercase; letter-spacing:.12em; color:#00788A; font-size:11px; font-weight:800; margin:0 0 8px;\">Your workspace<\u002Fp>\n            <h2 style=\"margin:0 0 10px; font-size:26px; line-height:1.18; letter-spacing:-.01em;\">Everything you need to be AFSP-ready for the 2027 season.<\u002Fh2>\n            <p style=\"line-height:1.6; color:#4B5563; margin:0 0 18px; max-width:54ch;\">Work the OGO course path, drill the three AFTR domains, and track your continuing-education hours against the IRS deadline — all in one place.<\u002Fp>\n            <div style=\"display:flex; gap:10px; flex-wrap:wrap;\">\n              <button onclick=\"{{ goBootcamp }}\" style=\"background:#00788A; color:#fff; border:0; font-weight:800; padding:12px 18px; border-radius:9px; cursor:pointer; white-space:nowrap;\">Open AFTR Bootcamp<\u002Fbutton>\n              <button onclick=\"{{ goReadiness }}\" style=\"background:#fff; color:#00788A; border:1px solid #00788A; font-weight:800; padding:12px 18px; border-radius:9px; cursor:pointer; white-space:nowrap;\">Check my AFSP track<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:linear-gradient(150deg,#00788A,#005A69); border-radius:16px; color:#fff; padding:26px; display:flex; flex-direction:column; justify-content:center;\">\n            <span style=\"font-size:12px; opacity:.88; font-weight:700; letter-spacing:.03em;\">AFSP READINESS<\u002Fspan>\n            <strong style=\"font-size:54px; line-height:1; margin:10px 0 6px; font-weight:800;\">{{ readinessPct }}<\u002Fstrong>\n            <div style=\"height:8px; background:rgba(255,255,255,.22); border-radius:20px; overflow:hidden; margin-bottom:12px;\"><div style=\"{{ readinessBar }}\"><\u002Fdiv><\u002Fdiv>\n            <small style=\"opacity:.9; line-height:1.5;\">{{ readinessNote }}<\u002Fsmall>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <section onclick=\"{{ goTicket }}\" style=\"{{ ticketTeaserStyle }}\">\n          <div style=\"display:flex; align-items:center; gap:16px;\">\n            <span style=\"{{ ticketTeaserBadgeStyle }}\">{{ ticketTeaserBadge }}<\u002Fspan>\n            <div>\n              <strong style=\"display:block; font-size:16px; letter-spacing:-.01em;\">{{ ticketTeaserTitle }}<\u002Fstrong>\n              <span style=\"display:block; font-size:12.5px; opacity:.85; margin-top:3px;\">{{ ticketTeaserSub }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font-weight:800; font-size:13px; white-space:nowrap;\">View →<\u002Fspan>\n        <\u002Fsection>\n\n        <h3 style=\"margin:30px 0 14px; font-size:15px; text-transform:uppercase; letter-spacing:.08em; color:#6F7780;\">CE-hour progress — {{ trackLabel }}<\u002Fh3>\n        <section class=\"ogo-3col\" style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:16px;\">\n          <sc-for list=\"{{ ceBuckets }}\" as=\"b\" hint-placeholder-count=\"3\">\n            <div style=\"background:#fff; border:1px solid #DCE6E8; border-radius:14px; padding:20px;\">\n              <div style=\"display:flex; justify-content:space-between;   <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:#fff; border:1px solid #DCE6E8; border-radius:14px; padding:22px; display:flex; flex-direction:column;\">\n            <h3 style=\"margin:0 0 6px; font-size:17px;\">Deadline tracker<\u002Fh3>\n            <p style=\"margin:0 0 16px; color:#6F7780; font-size:13px; line-height:1.5;\">All 2027-season CE must be completed by Dec 31, 2026.<\u002Fp>\n            <div style=\"background:#FFF8E8; border:1px solid #EFD98C; border-radius:12px; padding:18px; text-align:center;\">\n              <strong style=\"font-size:42px; color:#8A6D12; line-height:1; display:block;\">{{ daysLeft }}<\u002Fstrong>\n              <span style=\"font-size:12px; color:#8A6D12; font-weight:700;\">days until Dec 31, 2026<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"margin-top:14px; display:flex; flex-direction:column; gap:9px; font-size:12.5px; color:#4B5563;\">\n              <div style=\"display:flex; gap:8px;\"><span style=\"color:#00788A; font-weight:800;\">Oct 2026<\u002Fspan> PTIN renewal opens<\u002Fdiv>\n              <div style=\"display:flex; gap:8px;\"><span style=\"color:#00788A; font-weight:800;\">Dec 31<\u002Fspan> AFTR test + all CE due<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== COURSE PATH ===================== -->\n    <sc-if value=\"{{ isPath }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:flex; flex-direction:column; gap:18px;\">\n        <sc-for list=\"{{ phases }}\" as=\"ph\" hint-placeholder-count=\"6\">\n          <section style=\"background:#fff; border:1px solid #DCE6E8; border-radius:14px; padding:22px;\">\n            <div style=\"display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:6px;\">\n              <div>\n                <p style=\"text-transform:uppercase; letter-spacing:.1em; color:#00788A; font-size:10.5px; font-weight:800; margin:0 0 4px;\">{{ ph.tag }}<\u002Fp>\n                <h3 style=\"margin:0; font-size:18px;\">{{ ph.title }}<\u002Fh3>\n              <\u002Fdiv>\n              <span style=\"{{ ph.statePill }}\">{{ ph.state }}<\u002Fspan>\n            <\u002Fdiv>\n            <p style=\"color:#6F7780; font-size:13px; line-height:1.55; margin:0 0 16px; max-width:70ch;\">{{ ph.blurb }}<\u002Fp>\n            <div class=\"ogo-3col\" style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:12px;\">\n              <sc-for list=\"{{ ph.modules }}\" as=\"m\" hint-placeholder-count=\"3\">\n                <div onclick=\"{{ m.onClick }}\" style=\"{{ m.cardStyle }}\">\n                  <div style=\"display:flex; align-items:center; gap:8px; margin-bottom:6px;\">\n                    <span style=\"{{ m.numStyle }}\">{{ m.num }}<\u002Fspan>\n                    <strong style=\"font-size:13.5px; line-height:1.25;\">{{ m.title }}<\u002Fstrong>\n                  <\u002Fdiv>\n                  <p style=\"margin:0 0 10px; font-size:12px; color:#6F7780; line-height:1.5;\">{{ m.desc }}<\u002Fp>\n                  <div style=\"display:flex; align-items:center; justify-content:space-between; gap:8px; flex-wrap:wrap;\">\n                    <span style=\"{{ m.labPill }}\">{{ m.lab }}<\u002Fspan>\n                    <span style=\"{{ m.statusPill }}\">{{ m.statusText }}<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n            <sc-if value=\"{{ ph.hasCapstone }}\" hint-placeholder-val=\"{{ false }}\">\n              <div onclick=\"{{ ph.capstone.onClick }}\" style=\"margin-top:14px; cursor:pointer; display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap; background:linear-gradient(135deg,#00788A,#005A69); color:#fff; border-radius:12px; padding:18px 22px;\">\n                <div>\n                  <p style=\"text-t 151; line-height:1.5;\">{{ o }}<\u002Fli>\n                <\u002Fsc-for>\n              <\u002Ful>\n            <\u002Faside>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- QUIZ MODE -->\n        <sc-if value=\"{{ lessonQuizMode }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <sc-if value=\"{{ lessonSubmitted }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"{{ lessonResultStyle }}\">\n                <div style=\"display:flex; align-items:center; justify-content:space-between; gap:16px; flex-wrap:wrap;\">\n                  <div>\n                    <p style=\"text-transform:uppercase; letter-spacing:.1em; font-size:11px; font-weight:800; opacity:.9; margin:0 0 6px;\">{{ lessonResultTitle }}<\u002Fp>\n                    <div style=\"display:flex; align-items:baseline; gap:10px;\"><strong style=\"font-size:36px; line-height:1;\">{{ lessonPct }}<\u002Fstrong><span style=\"font-size:13px; opacity:.9;\">{{ lessonScoreFrac }}<\u002Fspan><\u002Fdiv>\n                    <p style=\"margin:8px 0 0; font-size:13.5px; opacity:.95; line-height:1.55; max-width:62ch;\">{{ lessonResultLine }}<\u002Fp>\n                  <\u002Fdiv>\n                  <div style=\"display:flex; gap:10px; flex-wrap:wrap;\">\n                    <sc-if value=\"{{ lessonPass }}\" hint-placeholder-val=\"{{ false }}\">\n                      <sc-if value=\"{{ hasNextLesson }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ goNextLesson }}\" style=\"background:#fff; color:#0F5C28; border:0; font-weight:800; padding:12px 18px; border-radius:9px; cursor:pointer;\">Next lesson →<\u002Fbutton><\u002Fsc-if>\n                      <button onclick=\"{{ goTicket }}\" style=\"background:rgba(255,255,255,.18); color:#fff; border:1px solid rgba(255,255,255,.5); font-weight:800; padding:12px 18px; border-radius:9px; cursor:pointer;\">Golden Ticket<\u002Fbutton>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ lesson  gap:12px; margin-top:18px; flex-wrap:wrap;\">\n              <button onclick=\"{{ backToReadMode }}\" style=\"background:#EAF4F6; border:0; color:#005A69; font-weight:800; padding:12px 18px; border-radius:9px; cursor:pointer;\">‹ Back to reading<\u002Fbutton>\n              <sc-if value=\"{{ lessonNotSubmitted }}\" hint-placeholder-val=\"{{ true }}\">\n                <button onclick=\"{{ submitLessonQuiz }}\" style=\"background:#00788A; color:#fff; border:0; font-weight:800; padding:13px 24px; border-radius:10px; cursor:pointer; font-size:15px;\">Submit answers<\u002Fbutton>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== PHASE 2 PRACTICE TEST ===================== -->\n    <sc-if value=\"{{ isPhase2Test }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <button onclick=\"{{ exitP2ToPath }}\" style=\"background:#EAF4F6; border:0; color:#005A69; font-weight:800; padding:10px 16px; border-radius:9px; cursor:pointer; margin-bottom:16px;\">‹ Course Path<\u002Fbutton>\n\n        <!-- INTRO -->\n        <sc-if value=\"{{ p2Intro }}\" hint-placeholder-val=\"{{ true }}\">\n          <section class=\"ogo-2col\" style=\"display:grid; grid-template-columns:1.5fr 1fr; gap:20px; align-items:start;\">\n            <div style=\"background:linear-gradient(150deg,#005A69,#00788A); color:#fff; border-radius:16px; padding:28px;\">\n              <p style=\"text-transform:uppercase; letter-spacing:.1em; font-size:11px; font-weight:800; opacity:.85; margin:0 0 8px;\">Phase 2 capstone<\u002Fp>\n              <h2 style=\"margin:0 0 10px; font-size:25px; line-height:1.2;\">Income Recognition Practice Test<\u002Fh2>\n              <p style=\"margin:0 0 18px; line-height:1.6; opacity:.92; font-size:14px;\">25 original OGO questions across four sections — W-2 &amp; tips, investments &amp; capital gains, retirement &amp; Social Security, and self-employmen .fbLabel }}<\u002Fstrong> {{ card.rationale }}<\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fsection>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <section style=\"background:#fff; border:1px solid #DCE6E8; border-radius:14px; padding:22px 24px;\">\n          <h3 style=\"margin:0 0 4px; font-size:17px;\">2026 Schedule C quick reference<\u002Fh3>\n          <p style=\"margin:0 0 16px; font-size:12.5px; color:#6F7780;\">Verify each figure against current IRS guidance before applying to a live client return.<\u002Fp>\n          <div style=\"display:flex; flex-direction:column; gap:0;\">\n            <div style=\"display:grid; grid-template-columns:1.3fr 1.4fr 1fr; gap:12px; padding:10px 12px; background:#F1F5F6; border-radius:8px; font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:#005A69;\">\n              <span>Item<\u002Fspan><span>Limit / requirement<\u002Fspan><span>Authority<\u002Fspan>\n            <\u002Fdiv>\n            <sc-for list=\"{{ scRefRows }}\" as=\"r\" hint-placeholder-count=\"8\">\n              <div style=\"display:grid; grid-template-columns:1.3fr 1.4fr 1fr; gap:12px; padding:12px; border-bottom:1px solid #EEF3F4; font-size:13.5px; color:#1F2937;\">\n                <span style=\"font-weight:700;\">{{ r.item }}<\u002Fspan><span>{{ r.limit }}<\u002Fspan><span style=\"color:#6F7780; font-size:12.5px;\">{{ r.auth }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== AFTR BOOTCAMP ===================== -->\n    <sc-if value=\"{{ isBootcamp }}\" hint-placeholder-val=\"{{ true }}\">\n      <div>\n\n        <!-- intro / domains -->\n        <sc-if value=\"{{ examIdle }}\" hint-placeholder-val=\"{{ true }}\">\n          <div>\n            <section class=\"ogo-3col\" style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:16px;\">\n              <sc-for count=\"20\">\n                    <button onclick=\"{{ n.onClick }}\" style=\"{{ n.style }}\">{{ n.num }}<\u002Fbutton>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n              <\u002Faside>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- results -->\n        <sc-if value=\"{{ examResults }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <section class=\"ogo-2col\" style=\"display:grid; grid-template-columns:.9fr 1.6fr; gap:20px;\">\n              <div style=\"{{ resultCardStyle }}\">\n                <p style=\"text-transform:uppercase; letter-spacing:.1em; font-size:11px; font-weight:800; opacity:.9; margin:0 0 8px;\">{{ resultStatus }}<\u002Fp>\n                <strong style=\"font-size:64px; line-height:1; font-weight:800;\">{{ scorePct }}<\u002Fstrong>\n                <p style=\"margin:10px 0 0; font-size:13px; opacity:.92; line-height:1.5;\">{{ scoreLine }}<\u002Fp>\n              <\u002Fdiv>\n              <div style=\"background:#fff; border:1px solid #DCE6E8; border-radius:16px; padding:24px;\">\n                <h3 style=\"margin:0 0 14px; font-size:17px;\">Domain breakdown<\u002Fh3>\n                <div style=\"display:flex; flex-direction:column; gap:14px;\">\n                  <sc-for list=\"{{ domainResults }}\" as=\"d\" hint-placeholder-count=\"3\">\n                    <div>\n                      <div style=\"display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px;\"><strong>{{ d.name }}<\u002Fstrong><span style=\"color:#6F7780;\">{{ d.frac }}<\u002Fspan><\u002Fdiv>\n                      <div style=\"height:9px; background:#E7EEF0; border-radius:20px; overflow:hidden;\"><div style=\"{{ d.bar }}\"><\u002Fdiv><\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fsc-for>\n                <\u002Fdiv>\n                <p style=\"margin:16px 0 0; font-size:12.5px; color:#6F7780; line-height:1.55;\">{{ weakNote }}<\u002Fp>\n                <div style=\"display:flex; gap:10px; margin-top:18px; flex-wrap:wrap;\">\n                  <button onclick=\"{{ enterReview }}\" style=\"background:#00788A; color:#fff; border:0; font-weight:800; padding:12px 18px; border-radius:9px; cursor:pointer;\">Review answers<\u002Fbutton>\n                  <button onclick=\"{{ restartExam }}\" style=\"background:#fff; color:#00788A; border:1px solid #00788A; font-weight:800; padding:12px 18px; border-radius:9px; cursor:pointer;\">Back to bootcamp<\u002Fbutton>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fsection>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- review -->\n        <sc-if value=\"{{ examReview }}\" hint-placeholder-val=\"{{ false }}\">\n          <div>\n            <button onclick=\"{{ exitReview }}\" style=\"background:#EAF4F6; border:0; color:#005A69; font-weight:800; padding:10px 16px; border-radius:9px; cursor:pointer; margin-bottom:16px;\">‹ Back to results<\u002Fbutton>\n            <div style=\"display:flex; flex-direction:column; gap:14px;\">\n              <sc-for list=\"{{ reviewList }}\" as=\"r\" hint-placeholder-count=\"5\">\n                <section style=\"background:#fff; border:1px solid #DCE6E8; border-radius:13px; padding:20px; border-left:5px solid {{ r.edge }};\">\n                  <div style=\"display:flex; gap:8px; align-items:center; margin-bottom:10px;\">\n                    <span style=\"font-weight:800; color:#005A69;\">{{ r.num }}.<\u002Fspan>\n                    <span style=\"{{ r.verdictStyle }}\">{{ r.verdict }}<\u002Fspan>\n                    <span style=\"font-size:11px; background:#EAF4F6; color:#005A69; border-radius:999px; padding:3px 9px; font-weight:700;\">{{ r.domain }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <p style=\"font-size:15px; font-weight:600; line-height:1.5; margin:0 0 12px;\">{{ r.prompt }}<\u002Fp>\n                  <div style=\"display:flex; flex-direction:column; gap:7px; margin-bottom:12px;\">\n                    <sc-for list=\"{{ r.choices }}\" as=\"c\" hint-placeholder-count=\"4\">\n                      <div style=\"{{ c.style }}\"><strong style=\"margin-right:6px;\">{{ c.letter }}.<\u002Fstrong>{{ c.text }}<\u002Fdiv>\n                    <\u002Fsc-for>\n                  <\u002Fdiv>\n                  <div style=\"background:#F4FBFC; border:1px solid #DBEDEF; border-radius:9px; padding:12px 14px; font-size:13px; line-height:1.55; color:#1F2937;\"><strong style=\"color:#005A69;\">Why:<\u002Fstrong> {{ r.rationale }}<\u002Fdiv>\n                <\u002Fsection>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== ETHICS ===================== -->\n    <sc-if value=\"{{ isEthics }}\" hint-placeholder-val=\"{{ true }}\">\n      <div>\n        <section style=\"background:linear-gradient(150deg,#005A69,#00788A); color:#fff; border-radius:16px; padding:26px; margin-bottom:20px;\">\n          <p style=\"text-transform:uppercase; letter-spacing:.1em; font-size:11px; font-weight:800; opacity:.85; margin:0 0 8px;\">2-hour ethics requirement<\u002Fp>\n          <h2 style=\"margin:0 0 8px; font-size:24px; line-height:1.2;\">Circular 230 &amp; preparer due diligence<\u002Fh2>\n          <p style=\"margin:0; line-height:1.6; opacity:.92; max-width:72ch; font-size:14px;\">Every AFSP track — exempt or non-exempt — requires 2 hours of ethics. This module maps to Circular 230 Subpart B and §10.51, the due-diligence rules behind Form 8867, and the penalties for getting it wrong.<\u002Fp>\n        <\u002Fsection>\n\n        <div class=\"ogo-2col\" style=\"display:grid; grid-template-columns:repeat(2,1fr); gap:16px;\">\n          <sc-for list=\"{{ ethicsCards }}\" as=\"e\" hint-placeholder-count=\"4\">\n            <section style=\"background:#fff; border:1px solid #DCE6E8; border-radius:14px; padding:22px;\">\n              <p style=\"text-transform:uppercase; letter-spacing:.08em; color:#00788A; font-size:10.5px; font-weight:800; margin:0 0 6px;\">{{ e.tag }}<\u002Fp>\n              <h3 style=\"margin:0 0 10px; font-size:17px;\">{{ e.title }}<\u002Fh3>\n              <ul style=\"margin:0; padding-left:18px; color:#4B5563; font-size:13.5px; line-height:1.7;\">\n                <sc-for list=\"{{ e.points }}\" as=\"pt\" hint-placeholder-count=\"3\">\n                  <li>{{ pt }}<\u002Fli>\n                <\u002Fsc-for>\n              <\u002Ful>\n            <\u002Fsection>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <section style=\"background:#FFF8E8; border:1px solid #EFD98C; border-radius:14px; padding:22px; margin-top:18px;\">\n          <h3 style=\"margin:0 0 8px; font-size:17px; color:#8A6D12;\">Due-diligence checkpoint — Form 8867<\u002Fh3>\n          <p style=\"margin:0 0 14px; color:#5C4A0E; font-size:13.5px; line-height:1.6; max-width:74ch;\">The paid-preparer due-diligence checklist applies to EITC, the Child Tax Credit / Additional CTC / Credit for Other Dependents, the American Opportunity Credit, and Head of Household status. For each, you must meet the knowledge, computation, record-retention, and submission requirements.<\u002Fp>\n          <div style=\"display:flex; gap:9px; flex-wrap:wrap;\">\n            <sc-for list=\"{{ eightSixSeven }}\" as=\"x\" hint-placeholder-count=\"5\">\n              <span style=\"background:#fff; border:1px solid #EFD98C; color:#8A6D12; border-radius:999px; padding:7px 13px; font-weight:800; font-size:12.5px;\">{{ x }}<\u002Fspan>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== READINESS ===================== -->\n    <sc-if value=\"{{ isReadiness }}\" hint-placeholder-val=\"{{ true }}\">\n      <div>\n        <section class=\"ogo-2col\" style=\"display:grid; grid-template-columns:1.1fr 1fr; gap:20px;\">\n          <div style=\"background:#fff; border:1px solid #DCE6E8; border-radius:16px; padding:24px;\">\n            <h3 style=\"margin:0 0 6px; font-size:18px;\">Exemption-track checker<\u002Fh3>\n            <p style=\"margin:0 0 16px; color:#6F7780; font-size:13px; line-height:1.55;\">Check anything that applies to you. Certain credentials exempt you from the AFTR course and put you on the 15-hour track.<\u002Fp>\n            <div style=\"display:flex; flex-direction:column; gap:9px;\">\n              <sc-for list=\"{{ exemptOptions }}\" as=\"o\" hint-placeholder-count=\"5\">\n                <button onclick=\"{{ o.onClick }}\" style=\"{{ o.style }}\">\n                  <span style=\"{{ o.box }}\">{{ o.check }}<\u002Fspan>\n                  <span style=\"text-align:left; line-height:1.4;\">{{ o.label }}<\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"{{ trackResultStyle }}\">\n            <p style=\"text-transform:uppercase; letter-spacing:.1em; font-size:11px; font-weight:800; opacity:.85; margin:0 0 8px;\">Your track<\u002Fp>\n            <h2 style=\"margin:0 0 6px; font-size:26px; line-height:1.15;\">{{ trackResultTitle }}<\u002Fh2>\n            <p style=\"margin:0 0 18px; font-size:13.5px; line-height:1.6; opacity:.95;\">{{ trackResultDesc }}<\u002Fp>\n            <div style=\"display:flex; flex-direction:column; gap:11px;\">\n              <sc-for list=\"{{ trackBuckets }}\" as=\"t\" hint-placeholder-count=\"3\">\n                <div style=\"background:rgba(255,255,255,.16); border-radius:10px; padding:13px 15px; display:flex; justify-content:space-between; align-items:center;\">\n                  <span style=\"font-weight:700; font-size:13.5px;\">{{ t.label }}<\u002Fspan>\n                  <strong style=\"font-size:16px;\">{{ t.hrs }}<\u002Fstrong>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsection>\n\n        <section class=\"ogo-3col\" style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-top:20px;\">\n          <sc-for list=\"{{ readinessSteps }}\" as=\"s\" hint-placeholder-count=\"3\">\n            <div style=\"background:#fff; border:1px solid #DCE6E8; border-radius:14px; padding:20px;\">\n              <span style=\"width:30px; height:30px; border-radius:9px; background:#EAF4F6; color:#005A69; font-weight:800; display:flex; align-items:center; justify-content:center; margin-bottom:11px;\">{{ s.num }}<\u002Fspan>\n              <h4 style=\"margin:0 0 7px; font-size:15px;\">{{ s.title }}<\u002Fh4>\n              <p style=\"margin:0; font-size:12.5px; color:#6F7780; line-height:1.55;\">{{ s.body }}<\u002Fp>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fsection>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== CROSSWALK ===================== -->\n    <sc-if value=\"{{ isCrosswalk }}\" hint-placeholder-val=\"{{ true }}\">\n      <div>\n        <p style=\"color:#6F7780; font-size:13.5px; line-height:1.6; margin:0 0 18px; max-width:80ch;\">Line-by-line proof that the OGO program covers the IRS-required AFSP structure — every module mapped to a CE category, hour count, and AFTR domain. Hour values are OGO study targets; official CE hours must be earned through an IRS-approved provider.<\u002Fp>\n        <div style=\"background:#fff; border:1px solid #DCE6E8; border-radius:14px; overflow:hidden;\">\n          <div style=\"overflow-x:auto;\">\n            <sc-for list=\"{{ crosswalk }}\" as=\"row\" hint-placeholder-count=\"10\">\n                  <\u002Fsc-for><table style=\"width:100%; border-collapse:collapse; min-width:720px; font-size:13px;\">\n              <thead>\n                <tr style=\"background:#005A69; color:#fff; text-align:left;\">\n                  <th style=\"padding:13px 16px; font-weight:800;\">OGO module / lab<\u002Fth>\n                  <th style=\"padding:13px 16px; font-weight:800;\">CE category<\u002Fth>\n                  <th style=\"padding:13px 16px; font-weight:800; text-align:center;\">Hours<\u002Fth>\n                  <th style=\"padding:13px 16px; font-weight:800;\">AFTR domain<\u002Fth>\n                  <th style=\"padding:13px 16px; font-weight:800;\">IRS source<\u002Fth>\n                <\u002Ftr>\n              <\u002Fthead>\n              <tbody>\n                <tr style=\"{{ row.style }}\">\n                    <td style=\"padding:12px 16px; font-weight:700;\">{{ row.module }}<\u002Ftd>\n                    <td style=\"padding:12px 16px; color:#4B5563;\">{{ row.cat }}<\u002Ftd>\n                    <td style=\"padding:12px 16px; text-align:center; font-weight:800; color:#00788A;\">{{ row.hrs }}<\u002Ftd>\n                    <td style=\"padding:12px 16px;\"><span style=\"font-size:11px; background:#EAF4F6; color:#005A69; border-radius:999px; padding:3px 9px; font-weight:700;\">{{ row.domain }}<\u002Fspan><\u002Ftd>\n                    <td style=\"padding:12px 16px; color:#6F7780;\">{{ row.src }}<\u002Ftd>\n                  <\u002Ftr>\n                \n                <tr style=\"background:#F4FBFC; border-top:2px solid #00788A;\">\n                  <td style=\"padding:13px 16px; font-weight:800;\" colspan=\"2\">Total — non-exempt AFSP requirement<\u002Ftd>\n                  <td style=\"padding:13px 16px; text-align:center; font-weight:800; color:#005A69;\">18<\u002Ftd>\n                  <td style=\"padding:13px 16px;\" colspan=\"2\"><span style=\"color:#005A69; font-weight:700; font-size:12px;\">6 AFTR + 10 tax law + 2 ethics ✓<\u002Fspan><\u002Ftd>\n                <\u002Ftr>\n              <\u002Ftbody>\n            <\u002Ftable>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== MANAGER ===================== -->\n    <sc-if value=\"{{ isManager }}\" hint-placeholder-val=\"{{ true }}\">\n      <div>\n        <section class=\"ogo-4col\" style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:20px;\">\n          <sc-for list=\"{{ managerStats }}\" as=\"s\" hint-placeholder-count=\"4\">\n            <div style=\"background:#fff; border:1px solid #DCE6E8; border-radius:13px; padding:18px;\">\n              <span style=\"display:block; color:#6F7780; font-size:12px; font-weight:700;\">{{ s.label }}<\u002Fspan>\n              <strong style=\"display:block; font-size:26px; margin:7px 0 2px; color:#005A69;\">{{ s.value }}<\u002Fstrong>\n              <small style=\"color:#6F7780;\">{{ s.sub }}<\u002Fsmall>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fsection>\n        <section style=\"background:#fff; border:1px solid #DCE6E8; border-radius:14px; overflow:hidden;\">\n          <div style=\"padding:18px 20px; border-bottom:1px solid #EDF2F3;\"><h3 style=\"margin:0; font-size:17px;\">Team readiness<\u002Fh3><\u002Fdiv>\n          <div style=\"overflow-x:auto;\">\n            <sc-for list=\"{{ team }}\" as=\"p\" hint-placeholder-count=\"5\">\n                  <\u002Fsc-for><table style=\"width:100%; border-collapse:collapse; min-width:620px; font-size:13px;\">\n              <thead>\n                <tr style=\"text-align:left; color:#6F7780;\">\n                  <th style=\"padding:11px 18px; font-weight:700;\">Preparer<\u002Fth>\n                  <th style=\"padding:11px 18px; font-weight:700;\">Track<\u002Fth>\n                  <th style=\"padding:11px 18px; font-weight:700;\">CE hours<\u002Fth>\n                  <th style=\"padding:11px 18px; font-weight:700;\">AFTR practice<\u002Fth>\n                  <th style=\"padding:11px 18px; font-weight:700;\">Status<\u002Fth>\n                <\u002Ftr>\n              <\u002Fthead>\n              <tbody>\n                <tr style=\"border-top:1px solid #EDF2F3;\">\n                    <td style=\"padding:13px 18px; font-weight:700;\">{{ p.name }}<\u002Ftd>\n                    <td style=\"padding:13px 18px; color:#4B5563;\">{{ p.track }}<\u002Ftd>\n                    <td style=\"padding:13px 18px;\">\n                      <div style=\"display:flex; align-items:center; gap:9px;\">\n                        <div style=\"width:90px; height:8px; background:#E7EEF0; border-radius:20px; overflow:hidden;\"><div style=\"{{ p.bar }}\"><\u002Fdiv><\u002Fdiv>\n                        <span style=\"font-size:12px; color:#6F7780;\">{{ p.ce }}<\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Ftd>\n                    <td style=\"padding:13px 18px; color:#4B5563;\">{{ p.aftr }}<\u002Ftd>\n                    <td style=\"padding:13px 18px;\"><span style=\"{{ p.pill }}\">{{ p.status }}<\u002Fspan><\u002Ftd>\n                  <\u002Ftr>\n                \n              <\u002Ftbody>\n            <\u002Ftable>\n          <\u002Fdiv>\n        <\u002Fsection>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <!-- ===================== GOLDEN TICKET ===================== -->\n    <sc-if value=\"{{ isTicket }}\" hint-placeholder-val=\"{{ false }}\">\n      <div>\n        <sc-if value=\"{{ ticketUnlocked }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"display:flex; flex-direction:column; align-items:center; gap:20px;\">\n            <div style=\"width:100%; max-width:720px; animation:ogoPop .5s ease both;\">\n              <div style=\"border-radius:18px; padding:2px; background:linear-gradient(135deg,#F6D976,#C9971F,#F9E7A6,#B9852A);\">\n                <div style=\"position:relative; overflow:hidden; border-radius:16px; background:linear-gradient(114deg,rgba(255,255,255,0) 40%,rgba(255,255,255,.5) 50%,rgba(255,255,255,0) 60%),linear-gradient(135deg,#FCEFB6,#F1CE67); display:grid; grid-template-columns:118px 1fr; min-height:236px;\">\n                  <div style=\"background:linear-gradient(#8A6410,#6E4E08); color:#F9E7A6; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; padding:16px; border-right:2px dashed rgba(255,255,255,.5);\">\n                    <img src=\"4be91112-0ed2-49d0-b2ad-fc9f8d4916d7\" alt=\"OGO\" style=\"width:46px; height:46px; object-fit:contain; background:#fff; border-radius:10px; padding:5px;\">\n                    <span style=\"writing-mode:vertical-rl; transform:rotate(180deg); font-weight:800; letter-spacing:.32em; font-size:13px;\">GOLDEN TICKET<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"position:relative; padding:26px 30px; color:#4A3608;\">\n                    <p style=\"text-transform:uppercase; letter-spacing:.2em; font-size:11px; font-weight:800; margin:0 0 4px; color:#7A5A10;\">OGO Tax Academy<\u002Fp>\n                    <h2 style=\"margin:0 0 4px; font-size:27px; font-weight:800; letter-spacing:-.01em;\">Foundations Golden Ticket<\u002Fh2>\n                    <p style=\"margin:0 0 16px; font-size:13.5px; line-height:1.55; max-width:46ch; color:#6B5011;\">Awarded for passing all three Phase 1 lessons. Congratulations, {{ ticketHolder }} — you’ve earned it.<\u002Fp>\n                    <div style=\"background:rgba(255,255,255,.5); border:1px solid rgba(138,100,16,.35); border-radius:11px; padding:14px 16px; font-size:13.5px; line-height:1.6; color:#4A3608;\">{{ ticketPerk }}<\u002Fdiv>\n                    <div style=\"display:flex; align-items:center; justify-content:space-between; margin-top:16px; gap:12px; flex-wrap:wrap;\">\n                      <div><span style=\"display:block; font-size:10px; text-transform:uppercase; letter-spacing:.14em; color:#7A5A10; font-weight:800;\">Ticket no.<\u002Fspan><strong style=\"font-size:15px; letter-spacing:.04em;\">{{ ticketCode }}<\u002Fstrong><\u002Fdiv>\n                      <sc-if value=\"{{ ticketRedeemed }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"background:#2E7D32; color:#fff; font-weight:800; font-size:12px; padding:9px 15px; border-radius:999px;\">Redeemed ✓<\u002Fspan><\u002Fsc-if>\n                      <sc-if value=\"{{ ticketNotRedeemed }}\" hint-placeholder-val=\"{{ true }}\"><button onclick=\"{{ redeemTicket }}\" style=\"background:#8A6410; color:#F9E7A6; border:0; font-weight:800; font-size:13.5px; padding:11px 20px; border-radius:9px; cursor:pointer;\">Redeem ticket<\u002Fbutton><\u002Fsc-if>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <p style=\"max-width:64ch; text-align:center; font-size:12.5px; color:#6F7780; line-height:1.6;\">Present this ticket number to your OGO manager to claim your reward. Golden Ticket rewards are an OGO Accounting Services incentive, separate from IRS AFSP requirements.<\u002Fp>\n            <button onclick=\"{{ goM1 }}\" style=\"background:#EAF4F6; border:0; color:#005A69; font-weight:800; padding:11px 20px; border-radius:9px; cursor:pointer;\">Revisit Phase 1 lessons<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <sc-if value=\"{{ ticketLocked }}\" hint-placeholder-val=\"{{ true }}\">\n          <section class=\"ogo-2col\" style=\"display:grid; grid-template-columns:1fr 1fr; gap:20px; align-items:start;\">\n            <div style=\"border-radius:16px; overflow:hidden; background:#EFF3F4; border:1px dashed #C2D0D2; min-height:236px; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:28px; gap:13px;\">\n              <div style=\"width:58px; height:58px; border-radius:15px; background:#DCE6E8; display:flex; align-items:center; justify-content:center;\">\n                <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#5C6B6E\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"4\" y=\"10.5\" width=\"16\" height=\"10.5\" rx=\"2\"><\u002Frect><path d=\"M8 10.5V7a4 4 0 0 1 8 0v3.5\"><\u002Fpath><\u002Fsvg>\n              <\u002Fdiv>\n              <h3 style=\"margin:0; font-size:19px; color:#4B5563;\">Golden Ticket locked<\u002Fh3>\n              <p style=\"margin:0; font-size:13px; color:#6F7780; line-height:1.6; max-width:36ch;\">Pass all three Foundations lessons to reveal your golden ticket and its reward.<\u002Fp>\n            <\u002Fdiv>\n            <div style=\"background:#fff; border:1px solid #DCE6E8; border-radius:16px; padding:24px;\">\n              <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:6px;\"><h3 style=\"margin:0; font-size:18px;\">Your progress<\u002Fh3><strong style=\"color:#C9A227; font-size:15px;\">{{ ticketProgressPct }}<\u002Fstrong><\u002Fdiv>\n              <p style=\"margin:0 0 14px; font-size:13px; color:#6F7780;\">{{ ticketProgressText }}<\u002Fp>\n              <div style=\"height:10px; background:#EEF3F3; border-radius:20px; overflow:hidden; margin-bottom:18px;\"><div style=\"{{ ticketProgressBar }}\"><\u002Fdiv><\u002Fdiv>\n              <div style=\"display:flex; flex-direction:column; gap:12px;\">\n                <sc-for list=\"{{ ticketChecklist }}\" as=\"c\" hint-placeholder-count=\"3\">\n                  <div style=\"display:flex; align-items:center; gap:12px;\"><span style=\"{{ c.markStyle }}\">{{ c.mark }}<\u002Fspan><span style=\"{{ c.textStyle }}\">{{ c.label }}<\u002Fspan><\u002Fdiv>\n                <\u002Fsc-for>\n              <\u002Fdiv>\n              <button onclick=\"{{ goM1 }}\" style=\"margin-top:20px; width:100%; background:#00788A; color:#fff; border:0; font-weight:800; padding:13px; border-radius:10px; cursor:pointer; font-size:14.5px;\">Continue Foundations →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsection>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fmain>\n\n  <!-- ===================== CERTIFICATE MODAL ===================== -->\n  <sc-if value=\"{{ showCert }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeCert }}\" style=\"position:fixed; inset:0; background:rgba(16,30,34,.55); display:flex; align-items:center; justify-content:center; padding:24px; z-index:50;\">\n      <div style=\"background:#fff; border-radius:14px; max-width:640px; width:100%; padding:8px;\">\n        <div style=\"border:2px solid #C9A227; border-radius:10px; padding:38px 40px; text-align:center; position:relative;\">\n          <img src=\"4be91112-0ed2-49d0-b2ad-fc9f8d4916d7\" alt=\"OGO\" style=\"width:74px; height:74px; object-fit:contain; margin:0 auto 6px;\">\n          <p style=\"text-transform:uppercase; letter-spacing:.22em; color:#C9A227; font-size:12px; font-weight:800; margin:0 0 18px;\">Bronze Tax Preparer<\u002Fp>\n          <p style=\"margin:0 0 4px; color:#6F7780; font-size:13px;\">This certifies that<\u002Fp>\n          <h2 style=\"margin:0 0 4px; font-size:30px; color:#005A69; font-weight:800;\">{{ certName }}<\u002Fh2>\n          <p style=\"margin:0 0 18px; color:#6F7780; font-size:13px; line-height:1.6; max-width:46ch; margin-left:auto; margin-right:auto;\">has completed the OGO Tax Academy AFSP readiness program and demonstrated foundational competency for the 2027 filing season (Tax Year 2026).<\u002Fp>\n          <div style=\"display:flex; justify-content:space-between; align-items:flex-end; margin-top:26px;\">\n            <div style=\"text-align:left;\"><strong style=\"display:block; font-size:13px; border-top:1px solid #1F2937; padding-top:5px;\">{{ certDate }}<\u002Fstrong><span style=\"font-size:11px; color:#6F7780;\">Date completed<\u002Fspan><\u002Fdiv>\n            <div style=\"text-align:right;\"><strong style=\"display:block; font-size:13px; border-top:1px solid #1F2937; padding-top:5px;\">OGO Accounting Services<\u002Fstrong><span style=\"font-size:11px; color:#6F7780;\">Tax Academy<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <p style=\"margin:22px 0 0; font-size:10px; color:#9aa3ab; line-height:1.5;\">Internal readiness milestone. Not an IRS AFSP Record of Completion. Official CE must be earned through an IRS-approved continuing-education provider.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"text-align:center; padding:14px;\">\n          <button onclick=\"{{ closeCert }}\" style=\"background:#005A69; color:#fff; border:0; font-weight:800; padding:11px 22px; border-radius:9px; cursor:pointer;\">Close<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1180,&quot;height&quot;:820},&quot;holderName&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;OGO Team Member&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Certificate &amp; Ticket&quot;},&quot;ticketCreditAmount&quot;:{&quot;editor&quot;:&quot;int&quot;,&quot;default&quot;:75,&quot;min&quot;:0,&quot;max&quot;:500,&quot;step&quot;:5,&quot;unit&quot;:&quot;$&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Golden Ticket&quot;},&quot;ticketPerk&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Redeem with your OGO manager for a $75 credit toward your IRS-approved AFTR provider fee — plus fast-track access to Phase 2: Income Recognition.&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Golden Ticket&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    view: 'dashboard',\n    examPhase: 'idle',          // idle | running | results | review\n    examIdx: 0,\n    answers: {},                // qid -> choiceIndex\n    secondsLeft: 10800,\n    attempts: 0,\n    lastScore: null,\n    flashIdx: 0,\n    flashFlipped: false,\n    exempt: {},                 // option key -> bool\n    showCert: false,\n    activeLesson: null,\n    lessonMode: 'read',        // read | quiz\n    lessonAnswers: {},\n    lessonSubmitted: false,\n    progress: {},              // mId -> {done, score}\n    ticketRedeemed: false,\n    p2Mode: 'intro',           // intro | test\n    p2Answers: {},\n    p2Submitted: false,\n    p2Seconds: 2700,\n    p2Best: null,\n    p3Mode: 'intro',           // intro | test\n    p3Answers: {},\n    p3Submitted: false,\n    p3Seconds: 2400,\n    p3Best: null,\n    p1Mode: 'intro',           // intro | test\n    p1Answers: {},\n    p1Submitted: false,\n    p1Seconds: 1500,\n    p1Best: null,\n    scAnswers: {},             // Schedule C lab card answers\n  };\n\n  ATTEMPT_CAP = 4;\n\n  // ---------- data ----------\n  bank = [\n    // Domain 1 — New tax law / recent updates\n    { id:'D1-1', domain:'Domain 1', topic:'1099-K reporting', prompt:'For 2026, the reinstated third-party network reporting exception means a Form 1099-K is generally not required when aggregate payments stay at or below which threshold?', choices:['$600 with any number of transactions','$5,000 regardless of count','$20,000 and 200 transactions','$10,000 and 50 transactions'], correctIndex:2, rationale:'Recent legislation reinstated the higher reporting floor — aggregate payments not exceeding $20,000 and not more than 200 transactions.' },\n    { id:'D1-2', domain:'Domain 1', topic:'Inflation adjustments', prompt:'Where do the annual inflation-adjusted figures used on the 2026 Form 1040 (brackets, standard deduction, phase-outs) originate?', choices:['A preparer trade association','The annual IRS revenue procedure for the tax year','Each state department of revenue','The Form 1040 instructions only'], correctIndex:1, rationale:'The IRS publishes inflation adjustments in an annual revenue procedure (Rev. Proc. 2025-32 for TY2026).' },\n    { id:'D1-3', domain:'Domain 1', topic:'Standard mileage', prompt:'A self-employed client wants to deduct vehicle costs using the standard mileage rate. Which is true about that rate?', choices:['It is fixed permanently by statute','The IRS sets it annually and it can change each year','It only applies to employees','It is the same as the medical mileage rate'], correctIndex:1, rationale:'The IRS announces standard mileage rates annually; the business rate is updated each year and must be verified for the current year.' },\n    { id:'D1-4', domain:'Domain 1', topic:'New deductions', prompt:'Recent legislation introduced new individual provisions a 2026 preparer should screen for. Which is an example a preparer must apply only as enacted and within stated limits?', choices:['Unlimited deduction for all tip income','A deduction for certain qualified tips, subject to limits and eligibility','A credit for owning any vehicle','A deduction for all overtime with no cap'], correctIndex:1, rationale:'New provisions such as a deduction for qualified tips apply only within the eligibility rules and dollar limits Congress enacted — verify against current guidance.' },\n    { id:'D1-5', domain:'Domain 1', topic:'Retirement limits', prompt:'Contribution and catch-up limits for IRAs and 401(k) plans for 2026 should be confirmed using what?', choices:['Last year\\u2019s figures, which never change','The current-year IRS-announced limits','The client\\u2019s estimate','The plan administrator\\u2019s marketing brochure'], correctIndex:1, rationale:'Retirement plan limits are indexed and announced annually by the IRS; always apply the current tax-year figures.' },\n    { id:'D1-6', domain:'Domain 1', topic:'Digital assets', prompt:'On the 2026 Form 1040, the digital-asset question must be answered by:', choices:['Only taxpayers who mined crypto','Every individual filer','Only taxpayers over 65','Only business filers'], correctIndex:1, rationale:'The digital-asset question must be answered by every individual filer, Yes or No, regardless of activity.' },\n\n    // Domain 2 — General review\n    { id:'D2-1', domain:'Domain 2', topic:'Filing status / HOH', prompt:'A taxpayer is unmarried, paid more than half the cost of keeping up her home, and her qualifying child lived with her all year. Which status is generally available?', choices:['Single','Married Filing Separately','Head of Household','Qualifying Surviving Spouse'], correctIndex:2, rationale:'Head of Household applies when the taxpayer is unmarried/considered unmarried, pays more than half the cost of the home, and has a qualifying person.' },\n    { id:'D2-2', domain:'Domain 2', topic:'W-2 wages', prompt:'Why can Box 1 of Form W-2 be lower than Box 3 for the same employee?', choices:['Box 3 always excludes bonuses','Pre-tax 401(k) deferrals can reduce Box 1 but not Box 3','Box 1 is the employee\\u2019s net pay','Box 3 includes the employer FICA match'], correctIndex:1, rationale:'Pre-tax elective deferrals reduce federal taxable wages in Box 1 while remaining subject to Social Security wages in Box 3.' },\n    { id:'D2-3', domain:'Domain 2', topic:'Taxable income', prompt:'Which of the following is generally taxable income to the recipient?', choices:['A qualified gift from a relative','Child support received','Unemployment compensation','A return of the taxpayer\\u2019s own capital'], correctIndex:2, rationale:'Unemployment compensation is generally taxable; gifts and child support received are not, and a return of capital is not income.' },\n    { id:'D2-4', domain:'Domain 2', topic:'IRAs', prompt:'A client takes a qualified distribution from a Roth IRA after age 59½ and after the 5-year rule is met. The distribution is:', choices:['Fully taxable','Tax-free','Subject to a 10% penalty','Taxable only on earnings'], correctIndex:1, rationale:'Qualified Roth distributions (account open 5 years and a qualifying event such as age 59½) are entirely tax-free.' },\n    { id:'D2-5', domain:'Domain 2', topic:'Capital gains', prompt:'An asset held for 14 months is sold at a gain. The gain is characterized as:', choices:['Short-term','Long-term','Ordinary wages','Tax-exempt'], correctIndex:1, rationale:'Assets held more than one year produce long-term capital gain, taxed at preferential rates.' },\n    { id:'D2-6', domain:'Domain 2', topic:'Standard deduction', prompt:'Which taxpayer generally cannot use the standard deduction?', choices:['A single filer under 65','A married filing jointly couple','A married filing separately taxpayer whose spouse itemizes','A head of household'], correctIndex:2, rationale:'If one spouse itemizes on an MFS return, the other spouse may not use the standard deduction.' },\n    { id:'D2-7', domain:'Domain 2', topic:'Schedule C', prompt:'For the business-use-of-home deduction, a key requirement is that the space is used:', choices:['Occasionally for business','Regularly and exclusively for business','Only for storing personal items','For commuting'], correctIndex:1, rationale:'The home-office deduction generally requires regular and exclusive use of the space for business.' },\n    { id:'D2-8', domain:'Domain 2', topic:'Dependents', prompt:'Which is a test for a qualifying child?', choices:['The child must file jointly to claim a refund','Age, residency, relationship, and support tests must be met','The child must be under 13 in all cases','The child must have earned income'], correctIndex:1, rationale:'A qualifying child must meet the relationship, age, residency, support, and joint-return tests.' },\n    { id:'D2-9', domain:'Domain 2', topic:'Education credits', prompt:'Compared with the Lifetime Learning Credit, the American Opportunity Tax Credit is distinctive because it:', choices:['Is fully nonrefundable','Is partially refundable and limited to the first four years of postsecondary study','Has no enrollment requirement','Covers graduate study indefinitely'], correctIndex:1, rationale:'The AOTC is 40% refundable and limited to the first four years of postsecondary education; the LLC is nonrefundable with no year limit.' },\n    { id:'D2-10', domain:'Domain 2', topic:'Retirement income', prompt:'Social Security benefits are:', choices:['Always fully taxable','Never taxable','Taxable up to a percentage depending on provisional income','Taxable only for self-employed taxpayers'], correctIndex:2, rationale:'Up to 50% or 85% of benefits may be taxable depending on the taxpayer\\u2019s provisional (combined) income.' },\n\n    // Domain 3 — Practices, procedures & professional responsibility\n    { id:'D3-1', domain:'Domain 3', topic:'Due diligence', prompt:'Form 8867 paid-preparer due diligence applies to all of the following EXCEPT:', choices:['Earned Income Tax Credit','Child Tax Credit / ODC','Head of Household filing status','The standard deduction'], correctIndex:3, rationale:'Form 8867 due diligence covers EITC, CTC/ACTC/ODC, AOTC, and HOH status — not the standard deduction.' },\n    { id:'D3-2', domain:'Domain 3', topic:'Circular 230', prompt:'Circular 230 Subpart B primarily governs:', choices:['State licensing fees','Duties and restrictions relating to practice before the IRS','Software pricing','Bank product fees'], correctIndex:1, rationale:'Subpart B sets out the duties and restrictions for practitioners who practice before the IRS.' },\n    { id:'D3-3', domain:'Domain 3', topic:'Representation rights', prompt:'An AFSP Record of Completion holder has which representation rights for 2027 returns they prepared?', choices:['Unlimited representation like an EA or CPA','Limited representation before certain IRS personnel','No representation rights at all','Representation only in Tax Court'], correctIndex:1, rationale:'AFSP participants have limited representation rights before revenue agents, customer service, and similar IRS employees for returns they prepared and signed.' },\n    { id:'D3-4', domain:'Domain 3', topic:'E-file requirements', prompt:'A preparer who reasonably expects to file 11 or more covered returns in a year is generally:', choices:['Exempt from e-file','Required to e-file (subject to limited exceptions)','Allowed to bill extra for paper','Required to mail all returns'], correctIndex:1, rationale:'The e-file mandate generally applies to preparers expecting to file 11 or more covered returns, with limited exceptions.' },\n    { id:'D3-5', domain:'Domain 3', topic:'Preparer penalties', prompt:'Failing to meet due-diligence requirements for a claimed credit can result in:', choices:['No consequence','A per-credit, per-return preparer penalty','Loss of the client\\u2019s refund only','An automatic audit of the preparer'], correctIndex:1, rationale:'IRC §6695(g) imposes a penalty for each failure to meet due diligence, assessed per credit/status per return.' },\n    { id:'D3-6', domain:'Domain 3', topic:'PTIN', prompt:'Before preparing returns for compensation in 2027, a preparer must:', choices:['Hold a CPA license','Have a valid PTIN for the year','Be an attorney','Register with the SEC'], correctIndex:1, rationale:'Anyone who prepares federal returns for compensation must have a valid, current-year PTIN.' },\n    { id:'D3-7', domain:'Domain 3', topic:'Recordkeeping', prompt:'For Form 8867 due diligence, the preparer must keep the worksheets and records for:', choices:['30 days','Three years from the relevant date','Indefinitely','Until the refund is issued'], correctIndex:1, rationale:'Due-diligence records must generally be retained for three years from the latest of specified dates.' },\n    { id:'D3-8', domain:'Domain 3', topic:'Confidentiality', prompt:'Disclosing a client\\u2019s tax return information without authorization may violate:', choices:['Only state law','IRC §7216 and related rules','Nothing if it is verbal','Circular 230 only when intentional'], correctIndex:1, rationale:'IRC §7216 restricts the use and disclosure of taxpayer return information and carries penalties.' },\n  ];\n\n  domainMeta = [\n    { key:'Domain 1', tag:'Domain 1', title:'New Tax Law & Recent Updates', blurb:'Annual inflation adjustments, recent legislation affecting the 2026 Form 1040, updated limits, mileage, and reporting thresholds.', topics:['Inflation adj.','New deductions','1099-K','Mileage','Digital assets'] },\n    { key:'Domain 2', tag:'Domain 2', title:'General Review', blurb:'Filing status, taxability of income, retirement income, IRAs, credits and deductions, capital g
